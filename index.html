<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nossa Jornada 👩‍❤️‍👨</title>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --primary: #FF4B5C; --sky: #BAE6FD; --card: #FFFFFF; --text-main: #1E293B; --text-sub: #64748B; --money: #10B981; }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--sky); margin: 0; padding: 0; overflow: hidden; touch-action: none; color: var(--text-main); }
        .header { background: #fff; padding: 20px 16px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.03); position: relative; z-index: 100; }
        .header h3 { margin: 0; font-size: 20px; color: var(--primary) !important; font-weight: 800; }
        #info { font-size: 11px; font-weight: 800; color: #000; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; display: block; }

        .aba { display: none; width: 100%; height: calc(100vh - 175px); overflow-y: auto; padding-bottom: 40px; -webkit-overflow-scrolling: touch; }
        .ativa { display: block; }
        .card { background: var(--card); padding: 24px; margin: 16px; border-radius: 32px; box-shadow: 0 12px 40px rgba(0,0,0,0.06); }
        
        .mapa-card { background: var(--card); margin: 16px; border-radius: 28px; height: calc(100% - 32px); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        #svg-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #fff; }
        path { fill: #F1F5F9; stroke: #fff; stroke-width: 0.8; transition: 0.5s; cursor: pointer; }
        
        /* CORES REGIÕES NO MAPA */
        .visitado[id^="BRAC"], .visitado[id^="BRAM"], .visitado[id^="BRRR"], .visitado[id^="BRRO"], .visitado[id^="BRPA"], .visitado[id^="BRAP"], .visitado[id^="BRTO"] { fill: #22C55E !important; }
        .visitado[id^="BRMA"], .visitado[id^="BRPI"], .visitado[id^="BRCE"], .visitado[id^="BRRN"], .visitado[id^="BRPB"], .visitado[id^="BRPE"], .visitado[id^="BRAL"], .visitado[id^="BRSE"], .visitado[id^="BRBA"] { fill: #FACC15 !important; }
        .visitado[id^="BRMT"], .visitado[id^="BRMS"], .visitado[id^="BRGO"], .visitado[id^="BRDF"] { fill: #FB923C !important; }
        .visitado[id^="BRMG"], .visitado[id^="BRSP"], .visitado[id^="BRRJ"], .visitado[id^="BRES"] { fill: #EC4899 !important; }
        .visitado[id^="BRPR"], .visitado[id^="BRSC"], .visitado[id^="BRRS"] { fill: #A855F7 !important; }

        /* GASTOS ALINHAMENTO */
        .resumo-uf-card { background: #fff; border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1.5px solid #F1F5F9; }
        .uf-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f8fafc; padding-bottom: 12px; margin-bottom: 12px; }
        .cidade-data-row { display: flex; justify-content: space-between; font-size: 13px; font-weight: 800; color: var(--text-main); margin-bottom: 10px; }

        /* CONQUISTAS */
        .badge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; justify-items: center; }
        .badge { display: flex; flex-direction: column; align-items: center; opacity: 0.15; filter: grayscale(1); transition: 0.3s; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .badge.active { opacity: 1; filter: grayscale(0); }
        .b-icon { width: 50px; height: 50px; background: #F1F5F9; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 4px; }

        /* MENU NAV */
        .menu-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; display: flex; height: 85px; border-top-left-radius: 30px; border-top-right-radius: 30px; z-index: 1000; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); }
        .btn-aba { flex: 1; border: none; background: none; font-size: 24px; color: #CBD5E1; cursor: pointer; outline: none; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        .btn-aba.active { color: var(--primary); transform: translateY(-5px); }

        /* POPUP ESTILO */
        #photo-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); background: #fff; padding: 24px; border-radius: 32px; box-shadow: 0 25px 60px rgba(0,0,0,0.3); z-index: 2100; width: 90%; max-width: 340px; opacity: 0; visibility: hidden; transition: 0.3s; }
        #photo-popup.show { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
        #popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; opacity: 0; visibility: hidden; transition: 0.3s; backdrop-filter: blur(4px); }
    </style>
</head>
<body>
    <div class="header"><h3>Nossa Jornada 👩‍❤️‍👨</h3><span id="info">ESTADOS CONQUISTADOS: 0</span></div>
    
    <div id="popup-overlay" onclick="fecharPopup()"></div>
    <div id="photo-popup">
        <button style="position:absolute; top:15px; right:15px; background:none; border:none; font-size:20px; font-weight:bold;" onclick="fecharPopup()">✕</button>
        <div id="popup-content" style="max-height: 400px; overflow-y: auto;"></div>
    </div>
    
    <div id="aba-mapa" class="aba ativa"><div class="mapa-card"><div id="svg-container"></div></div></div>
    
    <div id="aba-jornada" class="aba">
        <div class="card">
            <h3 style="margin:0 0 20px 0; color:var(--primary); font-size: 20px;">🏆 Conquistas</h3>
            <div class="badge-grid" id="grid-conquistas">
                </div>
        </div>
    </div>

    <div id="aba-timeline" class="aba"><div id="timeline-list"></div></div>
    <div id="aba-registro" class="aba">
        <div class="card">
            <h3 style="margin:0 0 10px 0; color:var(--primary)">📍 Nova Memória</h3>
            <label>Estado</label>
            <select id="sel-uf">
                <option value="BRSP">São Paulo</option><option value="BRRJ">Rio de Janeiro</option><option value="BRMG">Minas Gerais</option><option value="BRBA">Bahia</option><option value="BRSC">Santa Catarina</option><option value="BRPR">Paraná</option><option value="BRRS">Rio Grande do Sul</option><option value="BRGO">Goiás</option><option value="BRDF">Distrito Federal</option><option value="BRES">Espírito Santo</option><option value="BRCE">Ceará</option><option value="BRPE">Pernambuco</option><option value="BRRN">Rio Grande do Norte</option><option value="BRPB">Paraíba</option><option value="BRAL">Alagoas</option><option value="BRSE">Sergipe</option><option value="BRMA">Maranhão</option><option value="BRPI">Piauí</option><option value="BRMT">Mato Grosso</option><option value="BRMS">Mato Grosso do Sul</option><option value="BRTO">Tocantins</option><option value="BRPA">Pará</option><option value="BRAM">Amazonas</option><option value="BRRO">Rondônia</option><option value="BRAC">Acre</option><option value="BRRR">Roraima</option><option value="BRAP">Amapá</option>
            </select>
            <input type="text" id="txt-cidade" placeholder="Cidade">
            <input type="date" id="txt-data">
            <button class="btn-acao" onclick="salvarViagem()" style="background:var(--primary); color:#fff; width:100%; padding:15px; border-radius:15px; border:none; margin-top:10px; font-weight:800;">Salvar 🚩</button>
        </div>
    </div>
    <div id="aba-gastos" class="aba"><div id="lista-detalhada-gastos" class="card"></div></div>

    <nav class="menu-nav">
        <button class="btn-aba active" onclick="trocarAba('mapa', this)">🗺️</button>
        <button class="btn-aba" onclick="trocarAba('timeline', this)">🕒</button>
        <button class="btn-aba" onclick="trocarAba('jornada', this)">🏆</button>
        <button class="btn-aba" onclick="trocarAba('registro', this)">➕</button>
        <button class="btn-aba" onclick="trocarAba('gastos', this)">💰</button>
    </nav>

<script>
    // Configuração das Regiões
    const REGIOES = {
        'NORTE': { icon: '🌳', UFs: ['BRAC','BRAM','BRRR','BRRO','BRPA','BRAP','BRTO'], nomes: ['Acre','Amazonas','Roraima','Rondônia','Pará','Amapá','Tocantins'] },
        'NORDESTE': { icon: '🌵', UFs: ['BRMA','BRPI','BRCE','BRRN','BRPB','BRPE','BRAL','BRSE','BRBA'], nomes: ['Maranhão','Piauí','Ceará','Rio Grande do Norte','Paraíba','Pernambuco','Alagoas','Sergipe','Bahia'] },
        'CENTRO-OESTE': { icon: '☀️', UFs: ['BRMT','BRMS','BRGO','BRDF'], nomes: ['Mato Grosso','Mato Grosso do Sul','Goiás','Distrito Federal'] },
        'SUDESTE': { icon: '🏢', UFs: ['BRMG','BRSP','BRRJ','BRES'], nomes: ['Minas Gerais','São Paulo','Rio de Janeiro','Espírito Santo'] },
        'SUL': { icon: '❄️', UFs: ['BRPR','BRSC','BRRS'], nomes: ['Paraná','Santa Catarina','Rio Grande do Sul'] }
    };

    let panZoomMapa;
    async function init() {
        try {
            const res = await fetch('br.svg');
            const svg = await res.text();
            document.getElementById('svg-container').innerHTML = svg;
            const svgEl = document.querySelector('#svg-container svg');
            svgEl.id = "mapa-svg-real"; svgEl.style.width = "100%"; svgEl.style.height = "100%";
            panZoomMapa = svgPanZoom('#mapa-svg-real', { zoomEnabled: true, controlIconsEnabled: false, fit: true, center: true });
            atualizarInterface();
        } catch (e) { console.error(e); }
    }

    function trocarAba(id, btn) {
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.querySelectorAll('.btn-aba').forEach(b => b.classList.remove('active'));
        document.getElementById('aba-' + id).classList.add('ativa');
        btn.classList.add('active');
        if(id === 'jornada') renderJornada();
    }

    function salvarViagem() {
        const uf = document.getElementById('sel-uf').value;
        const cidade = document.getElementById('txt-cidade').value;
        const data = document.getElementById('txt-data').value;
        if(!cidade || !data) return;
        let db = JSON.parse(localStorage.getItem('viagens_vFinal_v14')) || {};
        if(!db[uf]) db[uf] = [];
        db[uf].push({cidade, data, total: 0, fotos: []});
        localStorage.setItem('viagens_vFinal_v14', JSON.stringify(db));
        location.reload();
    }

    function renderJornada() {
        const db = JSON.parse(localStorage.getItem('viagens_vFinal_v14')) || {};
        const visitados = Object.keys(db);
        let html = '';

        // 1. Conquistas Gerais (Ex: 1 estado, 5 estados...)
        const metas = [
            { id: 'm1', n: 1, label: 'INÍCIO', icon: '🌱' },
            { id: 'm5', n: 5, label: '5 ESTADOS', icon: '🏃' },
            { id: 'm26', n: 26, label: 'BRASIL', icon: '👑' }
        ];

        metas.forEach(m => {
            const ativa = visitados.length >= m.n;
            html += `<div class="badge ${ativa ? 'active' : ''}" onclick="infoGeral(${m.n}, ${visitados.length})">
                <div class="b-icon">${m.icon}</div>
                <div style="font-size:8px;font-weight:800">${m.label}</div>
            </div>`;
        });

        // 2. Conquistas por Região (Só acende se fechar a região)
        for (let r in REGIOES) {
            const regiao = REGIOES[r];
            const ufsDaRegiao = regiao.UFs;
            const visitadosNessaRegiao = ufsDaRegiao.filter(uf => visitados.includes(uf));
            const completa = visitadosNessaRegiao.length === ufsDaRegiao.length;

            html += `<div class="badge ${completa ? 'active' : ''}" onclick="verFaltantes('${r}')">
                <div class="b-icon">${regiao.icon}</div>
                <div style="font-size:8px;font-weight:800">${r}</div>
            </div>`;
        }

        document.getElementById('grid-conquistas').innerHTML = html;
    }

    function verFaltantes(nomeRegiao) {
        const regiao = REGIOES[nomeRegiao];
        const db = JSON.parse(localStorage.getItem('viagens_vFinal_v14')) || {};
        const visitados = Object.keys(db);
        
        const faltantes = regiao.nomes.filter((nome, i) => !visitados.includes(regiao.UFs[i]));
        
        let msg = '';
        if (faltantes.length === 0) {
            msg = `<div style="text-align:center"><h3 style="color:var(--money)">🏆 Região Conquistada!</h3><p>Vocês já visitaram todos os estados do ${nomeRegiao}!</p></div>`;
        } else {
            msg = `<h3>📍 Falta pouco no ${nomeRegiao}!</h3>
                   <p style="color:var(--text-sub)">Para ganhar esta medalha, vocês precisam visitar:</p>
                   <ul style="font-weight:700; color:var(--primary)">
                    ${faltantes.map(f => `<li>${f}</li>`).join('')}
                   </ul>`;
        }
        
        mostrarPopup(msg);
    }

    function infoGeral(meta, atual) {
        if(atual >= meta) return;
        mostrarPopup(`<h3>🚀 Rumo aos ${meta} Estados!</h3><p>Vocês já conquistaram <b>${atual}</b> de <b>${meta}</b> estados para este selo.</p>`);
    }

    function mostrarPopup(html) {
        document.getElementById('popup-content').innerHTML = html;
        document.getElementById('photo-popup').classList.add('show');
        document.getElementById('popup-overlay').style.visibility = 'visible';
        document.getElementById('popup-overlay').style.opacity = '1';
    }

    function fecharPopup() {
        document.getElementById('photo-popup').classList.remove('show');
        document.getElementById('popup-overlay').style.opacity = '0';
        setTimeout(() => document.getElementById('popup-overlay').style.visibility = 'hidden', 300);
    }

    function atualizarInterface() {
        const db = JSON.parse(localStorage.getItem('viagens_vFinal_v14')) || {};
        Object.keys(db).forEach(u => { const el = document.getElementById(u); if(el) el.classList.add('visitado'); });
        document.getElementById('info').innerText = `ESTADOS CONQUISTADOS: ${Object.keys(db).length}`;
    }

    init();
</script>
</body>
</html>
