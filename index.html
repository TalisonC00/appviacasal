<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nossa Jornada 👩‍❤️‍👨</title>
    
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');

        :root { 
            --primary: #FF4B5C; 
            --primary-dark: #E03E4D;
            --bg: #F8FAFC; 
            --card: #FFFFFF;
            --text-main: #1E293B;
            --text-sub: #64748B;
            --glass: rgba(255, 255, 255, 0.85);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            margin: 0; padding: 0; 
            overflow: hidden; 
            touch-action: none; 
            color: var(--text-main); 
        }
        
        /* HEADER PREMIUM */
        .header { 
            background: var(--glass); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 16px; 
            text-align: center; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); 
            position: relative; z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.3);
        }
        .header h3 { margin: 0; font-size: 18px; letter-spacing: -0.5px; }

        .aba { display: none; width: 100%; height: calc(100vh - 165px); overflow-y: auto; }
        .ativa { display: block; }

        /* MAPA */
        .mapa-card { 
            background: var(--card); 
            margin: 12px; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            height: calc(100% - 24px); 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
            border: 1px solid rgba(0,0,0,0.02);
        }
        
        #svg-container { width: 100%; height: 100%; cursor: move; background: #fff; }
        path { fill: #F1F5F9; stroke: #fff; stroke-width: 0.6; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .visitado { fill: var(--primary) !important; filter: drop-shadow(0 0 8px rgba(255,75,92,0.3)); }

        /* POP-UP DESIGN */
        #photo-popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            background: var(--card); padding: 20px; border-radius: 28px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.2);
            z-index: 2000; width: 88%; max-width: 340px; text-align: center;
            opacity: 0; visibility: hidden; transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #photo-popup.show { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
        
        .lista-memorias { max-height: 420px; overflow-y: auto; margin-top: 15px; padding-right: 4px; }
        .memoria-item { 
            background: #F8FAFC; padding: 12px; border-radius: 20px; 
            margin-bottom: 16px; text-align: left; 
            border: 1px solid rgba(0,0,0,0.03);
        }
        .foto-memoria { width: 100%; height: 180px; object-fit: cover; border-radius: 16px; }

        .close-popup { 
            position: absolute; top: 12px; right: 12px; 
            background: #f1f5f9; color: var(--text-main); border: none; border-radius: 50%; 
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            font-size: 18px; cursor: pointer; z-index: 10;
        }

        #popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); z-index: 1999; opacity: 0; visibility: hidden; transition: 0.3s; backdrop-filter: blur(4px); }
        #popup-overlay.show { opacity: 1; visibility: visible; }

        /* FORMULÁRIO */
        .card-form { background: var(--card); padding: 28px; margin: 16px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        select, input, .btn-submit { 
            width: 100%; padding: 16px; margin: 10px 0; border-radius: 16px; 
            border: 1px solid #E2E8F0; font-size: 15px; font-family: inherit; box-sizing: border-box; 
            background: #F8FAFC; outline: none; transition: 0.2s;
        }
        select:focus, input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(255,75,92,0.1); }
        
        .btn-submit { 
            background: var(--primary); color: white; border: none; font-weight: 700; 
            margin-top: 20px; cursor: pointer; box-shadow: 0 8px 20px rgba(255,75,92,0.25);
        }
        .btn-submit:active { transform: scale(0.97); background: var(--primary-dark); }
        
        label { font-size: 13px; font-weight: 600; color: var(--text-sub); margin-top: 15px; display: block; margin-left: 4px; }

        /* MENU INFERIOR GLASS */
        .menu-nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; box-shadow: 0 -8px 30px rgba(0,0,0,0.05); z-index: 1000; 
            border-top-left-radius: 32px; border-top-right-radius: 32px; height: 85px;
            border-top: 1px solid rgba(255,255,255,0.4);
        }
        .btn-aba { flex: 1; border: none; background: none; font-size: 26px; color: #CBD5E1; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .btn-aba.active { color: var(--primary); transform: translateY(-4px); }
    </style>
</head>
<body>

    <div class="header">
        <h3 style="color:var(--primary);"><span style="font-weight:400; color:var(--text-main)">Nossa</span> Jornada 👩‍❤️‍👨</h3>
        <span id="info" style="font-size: 11px; font-weight: 600; color:var(--text-sub); text-transform: uppercase; letter-spacing: 1px;">Carregando...</span>
    </div>

    <div id="popup-overlay" onclick="fecharPopup()"></div>
    <div id="photo-popup">
        <button class="close-popup" onclick="fecharPopup()">✕</button>
        <div id="popup-content"></div>
    </div>

    <div id="aba-mapa" class="aba ativa">
        <div class="mapa-card">
            <div id="svg-container"></div>
        </div>
    </div>

    <div id="aba-registro" class="aba">
        <div class="card-form">
            <h3 style="margin-top:0; font-size: 22px; letter-spacing: -0.5px;">📍 Nova Memória</h3>
            
            <label>Estado visitado</label>
            <select id="sel-uf">
                <option value="BRAC">Acre</option><option value="BRAL">Alagoas</option><option value="BRAM">Amazonas</option><option value="BRAP">Amapá</option><option value="BRBA">Bahia</option><option value="BRCE">Ceará</option><option value="BRDF">Distrito Federal</option><option value="BRES">Espírito Santo</option><option value="BRGO">Goiás</option><option value="BRMA">Maranhão</option><option value="BRMG">Minas Gerais</option><option value="BRMS">Mato Grosso do Sul</option><option value="BRMT">Mato Grosso</option><option value="BRPA">Pará</option><option value="BRPB">Paraíba</option><option value="BRPE">Pernambuco</option><option value="BRPI">Piauí</option><option value="BRPR">Paraná</option><option value="BRRJ">Rio de Janeiro</option><option value="BRRN">Rio Grande do Norte</option><option value="BRRO">Rondônia</option><option value="BRRR">Roraima</option><option value="BRRS">Rio Grande do Sul</option><option value="BRSC">Santa Catarina</option><option value="BRSE">Sergipe</option><option value="BRSP" selected>São Paulo</option><option value="BRTO">Tocantins</option>
            </select>

            <label>Cidade</label>
            <input type="text" id="txt-cidade" placeholder="Ex: Santos">
            
            <label>Quando foi?</label>
            <input type="date" id="txt-data">

            <label>Foto da aventura</label>
            <input type="file" id="inp-foto" accept="image/*" style="padding: 12px; background: transparent; border: 2px dashed #E2E8F0;">
            
            <button class="btn-submit" onclick="salvarViagem()">Salvar no Mapa 🚩</button>
        </div>
    </div>

    <nav class="menu-nav">
        <button class="btn-aba active" onclick="trocarAba('mapa', this)">🗺️</button>
        <button class="btn-aba" onclick="trocarAba('registro', this)">➕</button>
    </nav>

<script>
    let panZoomMapa;

    fetch('br.svg')
        .then(res => res.text())
        .then(svgText => {
            const container = document.getElementById('svg-container');
            container.innerHTML = svgText;
            const svgEl = container.querySelector('svg');
            svgEl.removeAttribute('width'); svgEl.removeAttribute('height');
            svgEl.id = "mapa-svg-real"; 

            panZoomMapa = svgPanZoom('#mapa-svg-real', {
                zoomEnabled: true, controlIconsEnabled: false,
                fit: true, center: true, minZoom: 1, maxZoom: 15,
                onPan: function() { svgEl.setAttribute('isPanning', 'true'); },
                onZoom: function() { svgEl.setAttribute('isPanning', 'true'); }
            });

            document.querySelectorAll('path').forEach(estado => {
                estado.addEventListener('touchend', function(e) {
                    if(e.cancelable) e.preventDefault(); 
                    if (svgEl.getAttribute('isPanning') === 'true') {
                        svgEl.setAttribute('isPanning', 'false'); return;
                    }
                    abrirHistorico(this.id);
                });
                estado.addEventListener('click', function() {
                    if (svgEl.getAttribute('isPanning') === 'true') {
                         svgEl.setAttribute('isPanning', 'false'); return;
                    }
                    abrirHistorico(this.id);
                });
            });
            atualizarInterface();
        });

    function trocarAba(id, btn) {
        fecharPopup();
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.querySelectorAll('.btn-aba').forEach(b => b.classList.remove('active'));
        document.getElementById('aba-' + id).classList.add('ativa');
        btn.classList.add('active');
    }

    function abrirHistorico(ufId) {
        const banco = JSON.parse(localStorage.getItem('viagens_vHist_v1')) || {};
        const lista = banco[ufId];

        if (lista && lista.length > 0) {
            const content = document.getElementById('popup-content');
            let html = `
                <h2 style="margin:0 0 5px 0; color:var(--primary); font-size:24px;">🚩 ${ufId.replace('BR','')}</h2>
                <p style="font-size:12px; color:var(--text-sub); margin-bottom:20px; font-weight:600;">HISTÓRICO DE AVENTURAS</p>
                <div class="lista-memorias">
            `;

            lista.forEach(v => {
                html += `
                    <div class="memoria-item">
                        ${v.foto ? `<img src="${v.foto}" class="foto-memoria">` : '<div style="height:100px; display:flex; align-items:center; justify-content:center; background:#eee; border-radius:12px; color:#aaa;">Sem foto</div>'}
                        <div style="padding: 10px 4px 0 4px;">
                            <p style="margin: 0; font-weight: 700; font-size: 17px; color:var(--text-main);">${v.cidade}</p>
                            <span style="font-size: 12px; font-weight:600; color: var(--text-sub);">📅 ${v.data}</span>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            content.innerHTML = html;
            document.getElementById('photo-popup').classList.add('show');
            document.getElementById('popup-overlay').classList.add('show');
        }
    }

    function fecharPopup() {
        document.getElementById('photo-popup').classList.remove('show');
        document.getElementById('popup-overlay').classList.remove('show');
    }

    async function salvarViagem() {
        const uf = document.getElementById('sel-uf').value;
        const cidade = document.getElementById('txt-cidade').value;
        const dataInput = document.getElementById('txt-data').value;
        const inputFoto = document.getElementById('inp-foto');
        
        if(!cidade) return alert("Escreva o nome da cidade!");

        let fotoBase64 = null;
        if (inputFoto.files && inputFoto.files[0]) {
            fotoBase64 = await converterEComprimirFoto(inputFoto.files[0]);
        }

        let dataFinal = dataInput ? dataInput.split('-').reverse().join('/') : new Date().toLocaleDateString('pt-BR');

        let viagensDB = JSON.parse(localStorage.getItem('viagens_vHist_v1')) || {};
        if (!viagensDB[uf]) viagensDB[uf] = [];

        viagensDB[uf].unshift({ cidade, foto: fotoBase64, data: dataFinal });
        localStorage.setItem('viagens_vHist_v1', JSON.stringify(viagensDB));
        
        location.reload(); 
    }

    function atualizarInterface() {
        const viagensDB = JSON.parse(localStorage.getItem('viagens_vHist_v1')) || {};
        const ufsSalvas = Object.keys(viagensDB); 

        ufsSalvas.forEach(uf => {
            const el = document.getElementById(uf) || document.querySelector(`[id="${uf}"]`);
            if(el) el.classList.add('visitado');
        });
        document.getElementById('info').innerText = `${ufsSalvas.length} ESTADOS CONQUISTADOS`;
    }

    function converterEComprimirFoto(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const maxDim = 400; 
                    let scale = maxDim / Math.max(img.width, img.height);
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                }
            }
        });
    }
</script>
</body>
</html>
