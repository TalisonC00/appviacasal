<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Colorido Brasil 🇧🇷</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --primary: #ff4b5c; }
        body { font-family: sans-serif; margin: 0; background: #f1f2f6; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }

        /* Painel de Controle */
        .painel { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 90%; max-width: 400px;
            background: white; padding: 15px; border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        input, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 14px; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .stats { font-size: 11px; color: #777; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="painel">
        <input type="text" id="cidade" placeholder="Cidade, Estado (ex: Santos, SP)">
        <button onclick="adicionarViagem()">Marcar e Colorir 🚩</button>
        <div id="stats" class="stats">Carregando mapa...</div>
    </div>

    <div id="map"></div>

    <script>
        // 1. LIMITES DO BRASIL
        const limitesBrasil = L.latLngBounds([5.27, -73.99], [-33.75, -34.79]);
        
        var map = L.map('map', {
            maxBounds: limitesBrasil,
            maxBoundsViscosity: 1.0,
            minZoom: 4
        }).setView([-15.78, -47.93], 4);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        var camadaGeoJSON;

        // 2. CARREGAR CONTORNOS DOS ESTADOS (GEOJSON)
        function carregarGeoJSON() {
            fetch('https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/brazil-states.geojson')
                .then(res => res.json())
                .then(data => {
                    renderizarMapa(data);
                })
                .catch(err => {
                    document.getElementById('stats').innerText = "Erro ao carregar contornos.";
                });
        }

        function renderizarMapa(data) {
            const visitados = JSON.parse(localStorage.getItem('estados_casal')) || [];
            
            if (camadaGeoJSON) map.removeLayer(camadaGeoJSON);

            camadaGeoJSON = L.geoJson(data, {
                style: function(feature) {
                    // DUPLA VERIFICAÇÃO: Checa sigla (SP) ou Nome (São Paulo)
                    const sigla = feature.properties.sigla;
                    const nome = feature.properties.name;
                    const estaColorido = visitados.some(v => v === sigla || v === nome);

                    return {
                        fillColor: estaColorido ? '#ff4b5c' : 'transparent',
                        weight: 1.5,
                        color: '#666',
                        fillOpacity: 0.5
                    };
                }
            }).addTo(map);

            document.getElementById('stats').innerText = `Estados coloridos: ${visitados.length}`;
        }

        // 3. LOGICA PARA BUSCAR CIDADE E IDENTIFICAR ESTADO
        async function adicionarViagem() {
            const input = document.getElementById('cidade').value;
            if (!input) return alert("Digite uma cidade!");

            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&q=${input}&countrycodes=br`);
                const data = await res.json();

                if (data.length === 0) return alert("Cidade não encontrada no Brasil.");

                const local = data[0];
                const addr = local.address;

                // Captura identificadores do estado (Sigla ou Nome)
                const idEstado = (addr.state_code || addr.state || "").toUpperCase();
                const nomeEstado = (addr.state || "");

                // Salva no LocalStorage
                let visitados = JSON.parse(localStorage.getItem('estados_casal')) || [];
                
                if (!visitados.includes(idEstado)) visitados.push(idEstado);
                if (!visitados.includes(nomeEstado)) visitados.push(nomeEstado);

                localStorage.setItem('estados_casal', JSON.stringify(visitados));

                // Coloca pino e atualiza cores
                L.marker([local.lat, local.lon]).addTo(map).bindPopup(`<b>${input}</b>`).openPopup();
                
                // Recarrega o GeoJSON para aplicar a nova cor
                carregarGeoJSON();
                
                map.setView([local.lat, local.lon], 7);
                document.getElementById('cidade').value = "";

            } catch (e) {
                alert("Erro na conexão.");
            }
        }

        // Iniciar
        window.onload = carregarGeoJSON;
    </script>
</body>
</html>
