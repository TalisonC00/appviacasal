<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nossa Jornada 👩‍❤️‍👨</title>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        :root { --primary: #FF4B5C; --sky: #BAE6FD; --card: #FFFFFF; --text-main: #1E293B; --text-sub: #64748B; --money: #10B981; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--sky); margin: 0; padding: 0; overflow: hidden; touch-action: none; color: var(--text-main); }
        .header { background: #fff; padding: 16px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.03); position: relative; z-index: 100; }
        .header h3 { margin: 0; font-size: 18px; color: var(--primary) !important; font-weight: 800; }
        #info { font-size: 11px; font-weight: 700; color: #000; text-transform: uppercase; letter-spacing: 1px; }
        .aba { display: none; width: 100%; height: calc(100vh - 165px); overflow-y: auto; padding-bottom: 30px; }
        .ativa { display: block; }
        .mapa-card { background: var(--card); margin: 12px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); height: calc(100% - 24px); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        #svg-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #fff; }
        #svg-container svg { width: 100% !important; height: 100% !important; object-fit: contain; }
        path { fill: #F1F5F9; stroke: #fff; stroke-width: 0.8; transition: all 0.5s ease; cursor: pointer; -webkit-tap-highlight-color: transparent; }

        /* CORES POR REGIÃO */
        .visitado[id^="BRAC"], .visitado[id^="BRAM"], .visitado[id^="BRRR"], .visitado[id^="BRRO"], .visitado[id^="BRPA"], .visitado[id^="BRAP"], .visitado[id^="BRTO"] { fill: #22C55E !important; }
        .visitado[id^="BRMA"], .visitado[id^="BRPI"], .visitado[id^="BRCE"], .visitado[id^="BRRN"], .visitado[id^="BRPB"], .visitado[id^="BRPE"], .visitado[id^="BRAL"], .visitado[id^="BRSE"], .visitado[id^="BRBA"] { fill: #FACC15 !important; }
        .visitado[id^="BRMT"], .visitado[id^="BRMS"], .visitado[id^="BRGO"], .visitado[id^="BRDF"] { fill: #FB923C !important; }
        .visitado[id^="BRMG"], .visitado[id^="BRSP"], .visitado[id^="BRRJ"], .visitado[id^="BRES"] { fill: #EC4899 !important; }
        .visitado[id^="BRPR"], .visitado[id^="BRSC"], .visitado[id^="BRRS"] { fill: #A855F7 !important; }

        /* POP-UP & GALERIA */
        #photo-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); background: #fff; padding: 20px; border-radius: 28px; box-shadow: 0 25px 60px rgba(0,0,0,0.3); z-index: 2100; width: 88%; max-width: 340px; text-align: center; opacity: 0; visibility: hidden; transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        #photo-popup.show { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
        .galeria-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 12px; }
        .foto-principal { grid-column: span 2; width: 100%; height: 180px; object-fit: cover; border-radius: 16px; background: #eee; }
        .foto-secundaria { width: 100%; height: 100px; object-fit: cover; border-radius: 12px; background: #eee; }
        .close-popup { position: absolute; top: -10px; right: -10px; background: var(--primary); color: white; border: none; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; z-index: 2200; font-weight: bold; }
        #popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; opacity: 0; visibility: hidden; transition: 0.3s; backdrop-filter: blur(4px); }
        #popup-overlay.show { opacity: 1; visibility: visible; }

        /* FORMULÁRIO & GASTOS */
        .card-form, .card-gastos { background: var(--card); padding: 25px; margin: 16px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        select, input, .btn-submit { width: 100%; padding: 14px; margin: 6px 0; border-radius: 14px; border: 1px solid #E2E8F0; font-size: 14px; font-family: inherit; box-sizing: border-box; background: #F8FAFC; outline: none; }
        .btn-submit { background: var(--primary); color: white; border: none; font-weight: 700; margin-top: 15px; cursor: pointer; }
        .estado-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .total-money { color: var(--money); font-weight: 800; }
        .gasto-total-brasil { margin-top: 10px; padding: 20px; background: var(--money); border-radius: 20px; color: #fff; text-align: center; font-weight: 800; font-size: 18px; }

        .menu-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); display: flex; height: 85px; border-top-left-radius: 32px; border-top-right-radius: 32px; z-index: 1000; }
        .btn-aba { flex: 1; border: none; background: none; font-size: 26px; color: #CBD5E1; cursor: pointer; transition: 0.3s; }
        .btn-aba.active { color: var(--primary); transform: translateY(-4px); }
        label { font-size: 11px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; margin-top: 8px; display: block; margin-left: 5px; }
    </style>
</head>
<body>
    <div class="header"><h3>Nossa Jornada 👩‍❤️‍👨</h3><span id="info">SINCRONIZANDO...</span></div>
    <div id="popup-overlay" onclick="fecharPopup()"></div>
    <div id="photo-popup"><button class="close-popup" onclick="fecharPopup()">✕</button><div id="popup-content"></div></div>
    
    <div id="aba-mapa" class="aba ativa"><div class="mapa-card"><div id="svg-container"></div></div></div>
    
    <div id="aba-registro" class="aba"><div class="card-form">
        <h3 style="margin:0 0 15px 0; color: var(--primary);">📍 Nova Memória</h3>
        <select id="sel-uf">
            <option value="BRAC">Acre</option><option value="BRAL">Alagoas</option><option value="BRAM">Amazonas</option><option value="BRAP">Amapá</option><option value="BRBA">Bahia</option><option value="BRCE">Ceará</option><option value="BRDF">Distrito Federal</option><option value="BRES">Espírito Santo</option><option value="BRGO">Goiás</option><option value="BRMA">Maranhão</option><option value="BRMG">Minas Gerais</option><option value="BRMS">Mato Grosso do Sul</option><option value="BRMT">Mato Grosso</option><option value="BRPA">Pará</option><option value="BRPB">Paraíba</option><option value="BRPE">Pernambuco</option><option value="BRPI">Piauí</option><option value="BRPR">Paraná</option><option value="BRRJ">Rio de Janeiro</option><option value="BRRN">Rio Grande do Norte</option><option value="BRRO">Rondônia</option><option value="BRRR">Roraima</option><option value="BRRS">Rio Grande do Sul</option><option value="BRSC">Santa Catarina</option><option value="BRSE">Sergipe</option><option value="BRSP" selected>São Paulo</option><option value="BRTO">Tocantins</option>
        </select>
        <input type="text" id="txt-cidade" placeholder="Cidade">
        <input type="date" id="txt-data">
        <label>Finanças (R$)</label>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <input type="number" id="v-hosp" placeholder="Hotel"><input type="number" id="v-trans" placeholder="Transp.">
            <input type="number" id="v-alime" placeholder="Aliment."><input type="number" id="v-atrac" placeholder="Atrações">
        </div>
        <label>Fotos (Até 3)</label>
        <input type="file" id="inp-foto" accept="image/*" multiple>
        <button class="btn-submit" onclick="salvarViagem()">Salvar Memória 🚩</button>
    </div></div>

    <div id="aba-gastos" class="aba"><div class="card-gastos">
        <h3 style="margin:0 0 20px 0; color: var(--money);">💰 Relatório Financeiro</h3>
        <div id="lista-detalhada-gastos"></div>
        <div class="gasto-total-brasil" id="total-geral-brasil">Total Brasil: R$ 0,00</div>
    </div></div>

    <nav class="menu-nav">
        <button class="btn-aba active" onclick="trocarAba('mapa', this)">🗺️</button>
        <button class="btn-aba" onclick="trocarAba('registro', this)">➕</button>
        <button class="btn-aba" onclick="trocarAba('gastos', this)">💰</button>
    </nav>

<script>
    let panZoomMapa;
    async function init() {
        try {
            const res = await fetch('br.svg');
            const svg = await res.text();
            const container = document.getElementById('svg-container');
            container.innerHTML = svg;
            const svgEl = container.querySelector('svg');
            svgEl.id = "mapa-svg-real";
            svgEl.style.width = "100%"; svgEl.style.height = "100%";
            panZoomMapa = svgPanZoom('#mapa-svg-real', { zoomEnabled: true, controlIconsEnabled: false, fit: true, center: true,
                onPan: () => svgEl.setAttribute('data-panning', 'true'),
                onZoom: () => svgEl.setAttribute('data-panning', 'true')
            });
            container.addEventListener('touchend', (e) => {
                if (svgEl.getAttribute('data-panning') === 'true') { svgEl.setAttribute('data-panning', 'false'); return; }
                const target = e.target.closest('path');
                if (target && target.id) abrirHistorico(target.id);
            });
            atualizarInterface();
        } catch (e) { document.getElementById('info').innerText = "ERRO AO LER MAPA"; }
    }

    function trocarAba(id, btn) {
        fecharPopup();
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.querySelectorAll('.btn-aba').forEach(b => b.classList.remove('active'));
        document.getElementById('aba-' + id).classList.add('ativa');
        btn.classList.add('active');
        if(id === 'gastos') renderGastos();
    }

    async function salvarViagem() {
        const uf = document.getElementById('sel-uf').value;
        const cidade = document.getElementById('txt-cidade').value;
        if(!cidade) return alert("Digite a cidade!");
        
        const files = document.getElementById('inp-foto').files;
        let fotosBase64 = [];
        for (let i = 0; i < Math.min(files.length, 3); i++) {
            fotosBase64.push(await converter(files[i]));
        }

        const data = document.getElementById('txt-data').value || new Date().toISOString().split('T')[0];
        const vH = parseFloat(document.getElementById('v-hosp').value || 0);
        const vT = parseFloat(document.getElementById('v-trans').value || 0);
        const vAl = parseFloat(document.getElementById('v-alime').value || 0);
        const vAt = parseFloat(document.getElementById('v-atrac').value || 0);

        let db = JSON.parse(localStorage.getItem('viagens_vFinal_v3Fotos')) || {};
        if(!db[uf]) db[uf] = [];
        db[uf].unshift({ cidade, data: data.split('-').reverse().join('/'), fotos: fotosBase64, hosp: vH, trans: vT, alime: vAl, atrac: vAt, total: (vH+vT+vAl+vAt) });
        
        localStorage.setItem('viagens_vFinal_v3Fotos', JSON.stringify(db));
        location.reload();
    }

    function abrirHistorico(ufId) {
        const db = JSON.parse(localStorage.getItem('viagens_vFinal_v3Fotos')) || {};
        const lista = db[ufId];
        if (!lista) return;
        let h = `<h2 style="color:var(--primary); margin-bottom:10px;">🚩 ${ufId.replace('BR','')}</h2><div style="max-height:400px; overflow-y:auto;">`;
        lista.forEach(v => {
            let galeriaHtml = '<div class="galeria-grid">';
            if(v.fotos && v.fotos.length > 0) {
                v.fotos.forEach((foto, idx) => {
                    galeriaHtml += `<img src="${foto}" class="${idx === 0 ? 'foto-principal' : 'foto-secundaria'}">`;
                });
            } else { galeriaHtml += '<div class="foto-principal" style="display:flex;align-items:center;justify-content:center;color:#999">Sem fotos</div>'; }
            galeriaHtml += '</div>';

            h += `<div style="background:#f8fafc; padding:12px; border-radius:20px; margin-bottom:15px; text-align:left;">
                ${galeriaHtml}
                <p style="margin:0; font-weight:700; font-size:16px;">${v.cidade}</p>
                <span style="font-size:12px; color:var(--text-sub);">📅 ${v.data}</span>
                <p style="margin:5px 0 0 0; color:var(--money); font-weight:800;">Total: R$ ${v.total.toFixed(2)}</p>
            </div>`;
        });
        document.getElementById('popup-content').innerHTML = h + '</div>';
        document.getElementById('photo-popup').classList.add('show');
        document.getElementById('popup-overlay').classList.add('show');
    }

    function renderGastos() {
        const db = JSON.parse(localStorage.getItem('viagens_vFinal_v3Fotos')) || {};
        const container = document.getElementById('lista-detalhada-gastos');
        let html = ''; let totalGeral = 0;
        for (const uf in db) {
            let totalUF = 0;
            let cidadesHtml = '';
            db[uf].forEach(c => {
                totalUF += c.total;
                cidadesHtml += `<div style="font-size:13px; display:flex; justify-content:space-between; padding:5px 0; border-top:1px dashed #eee;">
                    <span>🏙️ ${c.cidade}</span> <strong>R$ ${c.total.toFixed(2)}</strong>
                </div>`;
            });
            totalGeral += totalUF;
            html += `<div style="margin-bottom:15px;"><div class="estado-header"><strong>🚩 ${uf.replace('BR','')}</strong><span class="total-money">R$ ${totalUF.toFixed(2)}</span></div>${cidadesHtml}</div>`;
        }
        container.innerHTML = html || '<p style="text-align:center">Sem gastos!</p>';
        document.getElementById('total-geral-brasil').innerText = `Total Brasil: R$ ${totalGeral.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
    }

    function fecharPopup() { document.getElementById('photo-popup').classList.remove('show'); document.getElementById('popup-overlay').classList.remove('show'); }
    function atualizarInterface() {
        const db = JSON.parse(localStorage.getItem('viagens_vFinal_v3Fotos')) || {};
        const ufs = Object.keys(db);
        ufs.forEach(u => { const el = document.getElementById(u); if(el) el.classList.add('visitado'); });
        document.getElementById('info').innerText = `${ufs.length} ESTADOS CONQUISTADOS`;
    }
    function converter(f) {
        return new Promise(r => {
            const rd = new FileReader(); rd.readAsDataURL(f);
            rd.onload = e => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const cv = document.createElement('canvas'); const ctx = cv.getContext('2d');
                    const m = 600; let s = m / Math.max(img.width, img.height);
                    cv.width = img.width * s; cv.height = img.height * s;
                    ctx.drawImage(img, 0, 0, cv.width, cv.height); r(cv.toDataURL('image/jpeg', 0.5));
                };
            };
        });
    }
    init();
</script>
</body>
</html>
