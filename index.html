<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nossa Jornada 👩‍❤️‍👨</title>
    
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');

        :root { 
            --primary: #FF4B5C; 
            --sky: #BAE6FD; 
            --card: #FFFFFF;
            --text-main: #1E293B;
            --text-sub: #64748B;
            --glass: rgba(255, 255, 255, 0.85);
            --btn-blue: #3B82F6;
            --money: #10B981;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--sky); 
            margin: 0; padding: 0; 
            overflow: hidden; 
            touch-action: none; 
            color: var(--text-main); 
        }
        
        .header { 
            background: #fff; 
            padding: 16px; 
            text-align: center; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); 
            position: relative; z-index: 100;
        }
        .header h3 { margin: 0; font-size: 18px; color: var(--primary) !important; font-weight: 800; }
        #info { font-size: 11px; font-weight: 700; color: #000 !important; text-transform: uppercase; letter-spacing: 1px; }

        .aba { display: none; width: 100%; height: calc(100vh - 165px); overflow-y: auto; padding-bottom: 30px; }
        .ativa { display: block; }

        .mapa-card { 
            background: var(--card); 
            margin: 12px; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            height: calc(100% - 24px); 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        
        #svg-container { width: 100%; height: 100%; cursor: move; display: flex; align-items: center; justify-content: center; background: #fff; }
        #svg-container svg { width: 100% !important; height: 100% !important; object-fit: contain; }

        path { fill: #F1F5F9; stroke: #fff; stroke-width: 0.6; transition: all 0.4s ease; cursor: pointer; }
        .visitado { fill: var(--primary) !important; filter: drop-shadow(0 0 8px rgba(255,75,92,0.3)); }

        /* POP-UP */
        #photo-popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            background: var(--card); padding: 20px; border-radius: 28px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.2);
            z-index: 2000; width: 88%; max-width: 340px; text-align: center;
            opacity: 0; visibility: hidden; transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #photo-popup.show { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
        .lista-memorias { max-height: 400px; overflow-y: auto; margin-top: 15px; }
        .memoria-item { background: #F8FAFC; padding: 12px; border-radius: 20px; margin-bottom: 16px; text-align: left; border: 1px solid rgba(0,0,0,0.03); }
        .foto-memoria { width: 100%; height: 180px; object-fit: cover; border-radius: 16px; }

        .close-popup { position: absolute; top: -10px; right: -10px; background: var(--primary); color: white; border: none; border-radius: 50%; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; z-index: 10; font-weight: bold; }
        #popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1999; opacity: 0; visibility: hidden; transition: 0.3s; backdrop-filter: blur(4px); }
        #popup-overlay.show { opacity: 1; visibility: visible; }

        .card-form, .card-gastos { background: var(--card); padding: 25px; margin: 16px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        select, input, .btn-submit { width: 100%; padding: 14px; margin: 6px 0; border-radius: 14px; border: 1px solid #E2E8F0; font-size: 14px; font-family: inherit; box-sizing: border-box; background: #F8FAFC; outline: none; }
        .btn-submit { background: var(--primary); color: white; border: none; font-weight: 700; margin-top: 15px; cursor: pointer; }
        
        /* GASTOS */
        .gasto-container-item { border-bottom: 2px solid #F1F5F9; margin-bottom: 20px; padding-bottom: 10px; }
        .estado-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .cidade-gasto-item { font-size: 13px; color: var(--text-sub); display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 10px 0; border-top: 1px dashed #eee; }
        .total-money { color: var(--money); font-weight: 800; font-size: 16px; }
        .gasto-total-brasil { margin-top: 10px; padding: 20px; background: #10B981; border-radius: 20px; color: #fff; text-align: center; font-weight: 800; font-size: 20px; box-shadow: 0 10px 20px rgba(16,185,129,0.3); }

        .menu-nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; box-shadow: 0 -8px 30px rgba(0,0,0,0.05); z-index: 1000; 
            border-top-left-radius: 32px; border-top-right-radius: 32px; height: 85px;
        }
        .btn-aba { flex: 1; border: none; background: none; font-size: 26px; color: #CBD5E1; transition: 0.3s; cursor: pointer; }
        .btn-aba.active { color: var(--primary); transform: translateY(-4px); }
        #btn-registro.active { color: var(--btn-blue) !important; }
        #btn-gastos.active { color: var(--money) !important; }

        label { font-size: 11px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; margin-top: 8px; display: block; margin-left: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h3>Nossa Jornada 👩‍❤️‍👨</h3>
        <span id="info">SINCRONIZANDO...</span>
    </div>

    <div id="popup-overlay" onclick="fecharPopup()"></div>
    <div id="photo-popup">
        <button class="close-popup" onclick="fecharPopup()">✕</button>
        <div id="popup-content"></div>
    </div>

    <div id="aba-mapa" class="aba ativa"><div class="mapa-card"><div id="svg-container"></div></div></div>

    <div id="aba-registro" class="aba">
        <div class="card-form">
            <h3 style="margin:0 0 15px 0; font-size: 20px; color: var(--primary);">📍 Nova Memória</h3>
            <label>Onde?</label>
            <select id="sel-uf">
                <option value="BRAC">Acre</option><option value="BRAL">Alagoas</option><option value="BRAM">Amazonas</option><option value="BRAP">Amapá</option><option value="BRBA">Bahia</option><option value="BRCE">Ceará</option><option value="BRDF">Distrito Federal</option><option value="BRES">Espírito Santo</option><option value="BRGO">Goiás</option><option value="BRMA">Maranhão</option><option value="BRMG">Minas Gerais</option><option value="BRMS">Mato Grosso do Sul</option><option value="BRMT">Mato Grosso</option><option value="BRPA">Pará</option><option value="BRPB">Paraíba</option><option value="BRPE">Pernambuco</option><option value="BRPI">Piauí</option><option value="BRPR">Paraná</option><option value="BRRJ">Rio de Janeiro</option><option value="BRRN">Rio Grande do Norte</option><option value="BRRO">Rondônia</option><option value="BRRR">Roraima</option><option value="BRRS">Rio Grande do Sul</option><option value="BRSC">Santa Catarina</option><option value="BRSE">Sergipe</option><option value="BRSP" selected>São Paulo</option><option value="BRTO">Tocantins</option>
            </select>
            <input type="text" id="txt-cidade" placeholder="Nome da Cidade">
            <input type="date" id="txt-data">
            
            <label>Finanças da Viagem (R$)</label>
            <input type="number" id="v-hosp" placeholder="Hospedagem">
            <input type="number" id="v-trans" placeholder="Transportes">
            <input type="number" id="v-alime" placeholder="Alimentação">
            <input type="number" id="v-atrac" placeholder="Atrações">

            <label>Foto da Memória</label>
            <input type="file" id="inp-foto" accept="image/*" style="border: 2px dashed #E2E8F0; border-radius: 14px;">
            <button class="btn-submit" onclick="salvarViagem()">Salvar no Mapa 🚩</button>
        </div>
    </div>

    <div id="aba-gastos" class="aba">
        <div class="card-gastos">
            <h3 style="margin:0 0 20px 0; font-size: 20px; color: var(--money);">💰 Relatório Financeiro</h3>
            <div id="lista-detalhada-gastos"></div>
            <div class="gasto-total-brasil" id="total-geral-brasil">Total Brasil: R$ 0,00</div>
        </div>
    </div>

    <nav class="menu-nav">
        <button class="btn-aba active" onclick="trocarAba('mapa', this)">🗺️</button>
        <button class="btn-aba" id="btn-registro" onclick="trocarAba('registro', this)">➕</button>
        <button class="btn-aba" id="btn-gastos" onclick="trocarAba('gastos', this)">💰</button>
    </nav>

<script>
    let panZoomMapa;

    async function init() {
        const res = await fetch('br.svg');
        const svg = await res.text();
        document.getElementById('svg-container').innerHTML = svg;
        const svgEl = document.querySelector('#svg-container svg');
        svgEl.removeAttribute('width'); svgEl.removeAttribute('height');
        svgEl.id = "mapa-svg-real";
        svgEl.style.width = "100%"; svgEl.style.height = "100%";

        panZoomMapa = svgPanZoom('#mapa-svg-real', {
            zoomEnabled: true, controlIconsEnabled: false, fit: true, center: true,
            onPan: () => svgEl.setAttribute('isPanning', 'true'),
            onZoom: () => svgEl.setAttribute('isPanning', 'true')
        });

        document.querySelectorAll('path').forEach(el => {
            el.onclick = () => {
                if (svgEl.getAttribute('isPanning') === 'true') {
                    svgEl.setAttribute('isPanning', 'false'); return;
                }
                abrirHistorico(el.id);
            };
        });
        atualizarInterface();
    }

    function trocarAba(id, btn) {
        fecharPopup();
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.querySelectorAll('.btn-aba').forEach(b => b.classList.remove('active'));
        document.getElementById('aba-' + id).classList.add('ativa');
        btn.classList.add('active');
        if(id === 'gastos') renderGastos();
    }

    async function salvarViagem() {
        const uf = document.getElementById('sel-uf').value;
        const cidade = document.getElementById('txt-cidade').value;
        if(!cidade) return alert("Por favor, digite o nome da cidade!");
        
        const foto = document.getElementById('inp-foto').files[0];
        let fotoB64 = null;
        if(foto) fotoB64 = await converter(foto);

        const data = document.getElementById('txt-data').value;
        const vH = parseFloat(document.getElementById('v-hosp').value || 0);
        const vT = parseFloat(document.getElementById('v-trans').value || 0);
        const vAl = parseFloat(document.getElementById('v-alime').value || 0);
        const vAt = parseFloat(document.getElementById('v-atrac').value || 0);
        const total = vH + vT + vAl + vAt;

        // Chave de memória ATUALIZADA
        let db = JSON.parse(localStorage.getItem('viagens_vFinal_Gastos')) || {};
        if(!db[uf]) db[uf] = [];
        
        db[uf].unshift({ 
            cidade, 
            data: data.split('-').reverse().join('/'), 
            foto: fotoB64,
            hosp: vH, trans: vT, alime: vAl, atrac: vAt, total: total 
        });
        
        localStorage.setItem('viagens_vFinal_Gastos', JSON.stringify(db));
        location.reload();
    }

    function renderGastos() {
        const db = JSON.parse(localStorage.getItem('viagens_vFinal_Gastos')) || {};
        const container = document.getElementById('lista-detalhada-gastos');
        let html = ''; let totalGeral = 0;

        for (const uf in db) {
            let totalUF = 0;
            let cidadesHtml = '';
            db[uf].forEach(c => {
                totalUF += c.total;
                cidadesHtml += `
                    <div class="cidade-gasto-item">
                        <span>🏙️ ${c.cidade}</span> 
                        <span style="text-align:right">R$ ${c.total.toFixed(2)}</span>
                        <div style="grid-column: 1 / span 2; font-size:10px; color:#aaa; margin-top:5px;">
                            🏨 R$ ${c.hosp.toFixed(2)} | 🚗 R$ ${c.trans.toFixed(2)} | 🍴 R$ ${c.alime.toFixed(2)} | 🎡 R$ ${c.atrac.toFixed(2)}
                        </div>
                    </div>`;
            });
            totalGeral += totalUF;
            html += `
                <div class="gasto-container-item">
                    <div class="estado-header">
                        <span style="font-weight:700">🚩 ${uf.replace('BR','')}</span>
                        <span class="total-money">R$ ${totalUF.toFixed(2)}</span>
                    </div>
                    ${cidadesHtml}
                </div>`;
        }
        container.innerHTML = html || '<p style="text-align:center">Ainda não há gastos registrados!</p>';
        document.getElementById('total-geral-brasil').innerText = `Total Brasil: R$ ${totalGeral.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
    }

    function abrirHistorico(ufId) {
        const db = JSON.parse(localStorage.getItem('viagens_vFinal_Gastos')) || {};
        const lista = db[ufId];
        if (lista && lista.length > 0) {
            const popupContent = document.getElementById('popup-content');
            let h = `<h2 style="margin:0; color:var(--primary);">🚩 ${ufId.replace('BR','')}</h2><div class="lista-memorias">`;
            lista.forEach(v => {
                h += `
                <div class="memoria-item">
                    ${v.foto ? `<img src="${v.foto}" class="foto-memoria">` : '<div style="height:100px; display:flex; align-items:center; justify-content:center; background:#eee; border-radius:12px; color:#aaa">Sem foto</div>'}
                    <div style="padding:10px 4px 0 4px;">
                        <p style="margin:0; font-weight:700; font-size:17px;">${v.cidade}</p>
                        <span style="font-size:12px; font-weight:600; color:var(--text-sub);">📅 ${v.data}</span>
                        <p style="margin:5px 0; color:var(--money); font-weight:bold;">Total: R$ ${v.total.toFixed(2)}</p>
                    </div>
                </div>`;
            });
            h += `</div>`;
            popupContent.innerHTML = h;
            document.getElementById('photo-popup').classList.add('show');
            document.getElementById('popup-overlay').classList.add('show');
        }
    }

    function fecharPopup() { document.getElementById('photo-popup').classList.remove('show'); document.getElementById('popup-overlay').classList.remove('show'); }
    
    function atualizarInterface() {
        const db = JSON.parse(localStorage.getItem('viagens_vFinal_Gastos')) || {};
        const ufs = Object.keys(db);
        ufs.forEach(u => { const el = document.getElementById(u); if(el) el.classList.add('visitado'); });
        document.getElementById('info').innerText = `${ufs.length} ESTADOS CONQUISTADOS`;
    }
    
    function converter(f) {
        return new Promise(r => {
            const rd = new FileReader(); rd.readAsDataURL(f);
            rd.onload = e => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const cv = document.createElement('canvas'); const ctx = cv.getContext('2d');
                    const m = 400; let s = m / Math.max(img.width, img.height);
                    cv.width = img.width * s; cv.height = img.height * s;
                    ctx.drawImage(img, 0, 0, cv.width, cv.height); r(cv.toDataURL('image/jpeg', 0.6));
                };
            };
        });
    }
    init();
</script>
</body>
</html>
