<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Mapa Real 🇧🇷</title>
    <style>
        :root { --primary: #ff4b5c; }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 80px; text-align: center; }
        
        /* CONTAINER DO MAPA */
        .card { background: white; margin: 15px; padding: 15px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .mapa-wrapper { position: relative; width: 100%; max-width: 450px; margin: auto; }
        
        /* A IMAGEM REAL DO BRASIL (EMBUTIDA NO CÓDIGO) */
        .img-mapa { width: 100%; height: auto; display: block; opacity: 0.3; }
        
        /* O PINO 📌 */
        .pino {
            position: absolute;
            font-size: 25px;
            transform: translate(-50%, -100%);
            z-index: 10;
        }

        /* MENU E ABAS */
        .aba { display: none; padding: 15px; }
        .ativa { display: block; }
        .menu { position: fixed; bottom: 0; width: 100%; background: white; display: flex; box-shadow: 0 -4px 10px rgba(0,0,0,0.1); }
        .btn-menu { flex: 1; padding: 20px; border: none; background: none; font-size: 24px; color: #ccc; }
        .btn-menu.active { color: var(--primary); }

        /* FORMULÁRIO */
        select, input, button { width: 100%; padding: 15px; margin: 8px 0; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="aba-mapa" class="aba ativa">
        <div class="card">
            <h2 style="color:var(--primary)">🇧🇷 Nossa Jornada</h2>
            <div class="mapa-wrapper" id="container-mapa">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/be/Brazil_States_Blank_Map.svg/500px-Brazil_States_Blank_Map.svg.png" class="img-mapa" onerror="this.src='https://i.imgur.com/vHq16P9.png'">
                </div>
        </div>
    </div>

    <div id="aba-add" class="aba">
        <div class="card">
            <h2>📍 Registar Viagem</h2>
            <select id="sel-estado">
                <option value="48,78">São Paulo</option>
                <option value="60,72">Rio de Janeiro</option>
                <option value="55,60">Minas Gerais</option>
                <option value="75,45">Bahia</option>
                <option value="25,30">Amazonas</option>
                <option value="38,90">Rio Grande do Sul</option>
                <option value="82,28">Ceará</option>
                <option value="45,86">Santa Catarina</option>
                <option value="42,82">Paraná</option>
                <option value="48,50">Goiás</option>
                <option value="78,35">Pernambuco</option>
                <option value="35,15">Pará</option>
            </select>
            <input type="text" id="txt-cidade" placeholder="Cidade que visitaram">
            <button onclick="salvar()">Colocar Pino 📌</button>
        </div>
    </div>

    <nav class="menu">
        <button class="btn-menu active" onclick="mudar('mapa', this)">🗺️</button>
        <button class="btn-menu" onclick="mudar('add', this)">➕</button>
    </nav>

<script>
    // Carregar pinos salvos
    window.onload = function() {
        const salvos = JSON.parse(localStorage.getItem('viagens_vFinal')) || [];
        salvos.forEach(v => criarPino(v.x, v.y));
    };

    function mudar(id, btn) {
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.querySelectorAll('.btn-menu').forEach(b => b.classList.remove('active'));
        document.getElementById('aba-' + id).classList.add('ativa');
        btn.classList.add('active');
    }

    function salvar() {
        const coords = document.getElementById('sel-estado').value.split(',');
        const cid = document.getElementById('txt-cidade').value;
        if(!cid) return alert("Escreve a cidade!");

        const x = coords[0];
        const y = coords[1];

        criarPino(x, y);

        const viagens = JSON.parse(localStorage.getItem('viagens_vFinal')) || [];
        viagens.push({ x, y, cidade: cid });
        localStorage.setItem('viagens_vFinal', JSON.stringify(viagens));

        alert("Registado!");
        mudar('mapa', document.querySelectorAll('.btn-menu')[0]);
    }

    function criarPino(x, y) {
        const p = document.createElement('div');
        p.className = 'pino';
        p.innerHTML = '📌';
        p.style.left = x + '%';
        p.style.top = y + '%';
        document.getElementById('container-mapa').appendChild(p);
    }
</script>
</body>
</html>
