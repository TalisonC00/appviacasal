<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nossa Jornada 👩‍❤️‍👨</title>
    
    <script src="mapdata.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --primary: #FF4B5C; --sky: #BAE6FD; --card: #FFFFFF; --text-main: #1E293B; --text-sub: #64748B; --money: #10B981; }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--sky); margin: 0; padding: 0; overflow: hidden; touch-action: none; color: var(--text-main); }
        
        /* HEADER */
        .header { background: #fff; padding: 12px 16px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.03); position: relative; z-index: 100; }
        .header h3 { margin: 0; font-size: 18px; color: var(--primary) !important; font-weight: 800; }
        #info { font-size: 10px; font-weight: 800; color: #000; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; display: block; }

        /* ÁREA DE CONTEÚDO */
        .aba { display: none; width: 100%; height: calc(100vh - 125px); overflow-y: auto; padding-bottom: 20px; -webkit-overflow-scrolling: touch; }
        .ativa { display: block; }
        
        /* CARDS */
        .card { background: var(--card); padding: 20px; margin: 16px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
        .card h3 { margin: 0 0 20px 0; font-size: 20px; color: var(--primary); display: flex; align-items: center; gap: 8px; }

        /* MAPA PADRÃO COM SIGLAS */
        .mapa-card { background: var(--card); margin: 16px; border-radius: 28px; height: calc(100% - 32px); position: relative; overflow: hidden; }
        #svg-container { width: 100%; height: 100%; display: block; position: relative; }
        svg { width: 100%; height: 100%; display: block; }
        path { fill: #F1F5F9; stroke: #fff; stroke-width: 0.8; transition: 0.3s; cursor: pointer; }

        /* ESTILO DAS SIGLAS NO MAPA */
        .state-label-text {
            font-size: 8px;
            font-weight: 800;
            fill: #94a3b8;
            pointer-events: none;
            text-anchor: middle;
            dominant-baseline: middle;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* TIMELINE */
        .timeline-container { padding: 10px 5px; position: relative; }
        .timeline-line { position: absolute; left: 33px; top: 60px; bottom: 20px; width: 3px; background: rgba(255,255,255,0.8); z-index: 0; }
        .timeline-item { display: flex; gap: 15px; margin-bottom: 25px; position: relative; z-index: 2; margin-left: 20px; margin-right: 16px; }
        .t-dot { min-width: 14px; height: 14px; background: var(--primary); border: 3px solid #fff; border-radius: 50%; margin-top: 6px; z-index: 3; }
        .t-card { background: #fff; padding: 18px; border-radius: 24px; flex: 1; box-shadow: 0 8px 25px rgba(0,0,0,0.04); }

        /* GASTOS */
        .resumo-uf-card { background: #fff; border-radius: 24px; padding: 24px; margin-bottom: 24px; border: 1.5px solid #F1F5F9; }
        .uf-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f8fafc; padding-bottom: 12px; margin-bottom: 12px; font-weight: 800; }
        .gasto-entry { padding: 15px 0; border-bottom: 1px solid #f8fafc; }
        .cidade-data-row { display: flex; justify-content: space-between; font-size: 12px; font-weight: 700; margin-bottom: 8px; }
        .pill { background: #F8FAFC; padding: 6px 10px; border-radius: 10px; font-size: 10px; font-weight: 700; color: var(--text-sub); display: flex; align-items: center; gap: 4px; border: 1px solid #eee; }

        /* CONQUISTAS */
        .badge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; justify-items: center; }
        .badge { display: flex; flex-direction: column; align-items: center; width: 80px; opacity: 0.15; filter: grayscale(1); transition: 0.4s; }
        .badge.active { opacity: 1; filter: grayscale(0); }
        .b-icon { width: 52px; height: 52px; background: #F1F5F9; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 6px; }

        /* POP-UP */
        #photo-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); background: #fff; padding: 24px; border-radius: 32px; box-shadow: 0 25px 60px rgba(0,0,0,0.3); z-index: 2100; width: 90%; max-width: 340px; opacity: 0; visibility: hidden; transition: 0.3s; }
        #photo-popup.show { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
        .popup-scroll { max-height: 450px; overflow-y: auto; text-align: left; }
        .carousel-fotos { position: relative; width: 100%; overflow: hidden; border-radius: 20px; margin: 10px 0; height: 180px; background: #f1f5f9; }
        .track-fotos { display: flex; transition: transform 0.4s ease; height: 100%; }
        .img-slide { min-width: 100%; height: 100%; object-fit: cover; }
        .close-popup { position: absolute; top: 12px; right: 12px; background: var(--primary); color: white; border: none; border-radius: 50%; width: 30px; height: 30px; font-weight: bold; cursor: pointer; z-index: 3000 !important; }

        /* MENU INFERIOR REDUZIDO (55px) */
        .menu-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; display: flex; height: 55px; border-top-left-radius: 25px; border-top-right-radius: 25px; z-index: 1000; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); }
        .btn-aba { flex: 1; border: none; background: none; font-size: 20px; color: #CBD5E1; cursor: pointer; -webkit-tap-highlight-color: transparent; outline: none; }
        .btn-aba.active { color: var(--primary); transform: translateY(-3px); transition: 0.3s; }

        /* FORMULÁRIO */
        input, select { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #F1F5F9; font-family: inherit; background: #F8FAFC; box-sizing: border-box; }
        .btn-acao { background: var(--primary); color: #fff; border: none; padding: 16px; border-radius: 18px; width: 100%; font-weight: 800; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header"><h3>Nossa Jornada 👩‍❤️‍👨</h3><span id="info">ESTADOS CONQUISTADOS: 0</span></div>
    
    <div id="popup-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:2000;display:none;backdrop-filter:blur(4px);" onclick="fecharPopup()"></div>
    <div id="photo-popup"><button class="close-popup" onclick="fecharPopup()">✕</button><div id="popup-content" class="popup-scroll"></div></div>
    
    <div id="aba-mapa" class="aba ativa"><div class="mapa-card"><div id="svg-container"></div></div></div>
    
    <div id="aba-timeline" class="aba"><div class="timeline-container"><h3 style="margin:0 0 25px 20px; color:var(--primary)">📅 Timeline</h3><div class="timeline-line"></div><div id="timeline-list"></div></div></div>
    
    <div id="aba-jornada" class="aba"><div class="card"><h3>🏆 Conquistas</h3><div class="badge-grid" id="grid-conquistas"></div></div></div>
    
    <div id="aba-registro" class="aba">
        <div class="card">
            <h3>📍 Nova Memória</h3>
            <label style="font-size:10px; font-weight:800; color:var(--text-sub); text-transform:uppercase; display:block; margin:0 0 5px 5px;">Estado</label>
            <select id="sel-uf">
                <option value="BRSP">São Paulo</option><option value="BRRJ">Rio de Janeiro</option><option value="BRMG">Minas Gerais</option><option value="BRBA">Bahia</option><option value="BRSC">Santa Catarina</option><option value="BRPR">Paraná</option><option value="BRRS">Rio Grande do Sul</option><option value="BRGO">Goiás</option><option value="BRDF">Distrito Federal</option><option value="BRES">Espírito Santo</option><option value="BRCE">Ceará</option><option value="BRPE">Pernambuco</option><option value="BRRN">Rio Grande do Norte</option><option value="BRPB">Paraíba</option><option value="BRAL">Alagoas</option><option value="BRSE">Sergipe</option><option value="BRMA">Maranhão</option><option value="BRPI">Piauí</option><option value="BRMT">Mato Grosso</option><option value="BRMS">Mato Grosso do Sul</option><option value="BRTO">Tocantins</option><option value="BRPA">Pará</option><option value="BRAM">Amazonas</option><option value="BRRO">Rondônia</option><option value="BRAC">Acre</option><option value="BRRR">Roraima</option><option value="BRAP">Amapá</option>
            </select>
            <label style="font-size:10px; font-weight:800; color:var(--text-sub); text-transform:uppercase; display:block; margin:10px 0 5px 5px;">Cidade</label><input type="text" id="txt-cidade" placeholder="Ex: Gramado">
            <label style="font-size:10px; font-weight:800; color:var(--text-sub); text-transform:uppercase; display:block; margin:10px 0 5px 5px;">Data</label><input type="date" id="txt-data">
            <label style="display:flex; align-items:center; gap:8px; margin:15px 0;"><input type="checkbox" id="chk-praia" style="width:18px;height:18px;"><span style="font-size:12px; font-weight:800; color:var(--text-sub)">VIAGEM DE PRAIA? 🏖️</span></label>
            <label style="font-size:10px; font-weight:800; color:var(--text-sub); text-transform:uppercase; display:block; margin:10px 0 5px 5px;">Gastos (R$)</label>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"><input type="number" id="v-hosp" placeholder="Hotel"><input type="number" id="v-trans" placeholder="Transp."></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:8px;"><input type="number" id="v-alime" placeholder="Comida"><input type="number" id="v-atrac" placeholder="Atrações"></div>
            <label style="font-size:10px; font-weight:800; color:var(--text-sub); text-transform:uppercase; display:block; margin:10px 0 5px 5px;">Fotos (Máx 3)</label><input type="file" id="inp-foto" accept="image/*" multiple>
            <button class="btn-acao" onclick="salvarViagem()">Salvar Memória 🚩</button>
        </div>
    </div>

    <div id="aba-gastos" class="aba">
        <div class="card" style="padding:20px 16px;">
            <h3>💰 Relatório</h3>
            <div id="lista-detalhada-gastos"></div>
            <div style="background:var(--sky); color:#000; padding:18px; border-radius:22px; text-align:center; font-weight:800; font-size:16px; margin:25px 0 5px 0;" id="total-geral-brasil">Total Brasil: R$ 0,00</div>
        </div>
    </div>

    <nav class="menu-nav">
        <button class="btn-aba active" onclick="trocarAba('mapa', this)">🗺️</button>
        <button class="btn-aba" onclick="trocarAba('timeline', this)">🕒</button>
        <button class="btn-aba" onclick="trocarAba('jornada', this)">🏆</button>
        <button class="btn-aba" onclick="trocarAba('registro', this)">➕</button>
        <button class="btn-aba" onclick="trocarAba('gastos', this)">💰</button>
    </nav>

<script>
    const REGIOES = {
        'NORTE': { color: '#22C55E', UFs: ['BRAC','BRAM','BRRR','BRRO','BRPA','BRAP','BRTO'] },
        'NORDESTE': { color: '#FACC15', UFs: ['BRMA','BRPI','BRCE','BRRN','BRPB','BRPE','BRAL','BRSE','BRBA'] },
        'CENTRO': { color: '#FB923C', UFs: ['BRMT','BRMS','BRGO','BRDF'] },
        'SUDESTE': { color: '#EC4899', UFs: ['BRMG','BRSP','BRRJ','BRES'] },
        'SUL': { color: '#A855F7', UFs: ['BRPR','BRSC','BRRS'] }
    };

    async function init() {
        const res = await fetch('br.svg');
        const svgText = await res.text();
        const container = document.getElementById('svg-container');
        container.innerHTML = svgText;
        const svgEl = container.querySelector('svg');

        // GERA AS SIGLAS BASEADO NO MAPDATA.JS
        container.querySelectorAll('path').forEach(state => {
            const id = state.id;
            const data = simplemaps_countrymap_mapdata.state_specific[id];
            if (data) {
                const bbox = state.getBBox();
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", bbox.x + bbox.width / 2);
                text.setAttribute("y", bbox.y + bbox.height / 2);
                text.setAttribute("class", "state-label-text");
                text.textContent = data.description || id.replace('BR','');
                svgEl.appendChild(text);
            }
            state.addEventListener('click', () => abrirHistorico(id));
        });
        atualizarInterface();
    }

    function trocarAba(id, btn) {
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.querySelectorAll('.btn-aba').forEach(b => b.classList.remove('active'));
        document.getElementById('aba-' + id).classList.add('ativa');
        btn.classList.add('active');
        if(id === 'gastos') renderGastos();
        if(id === 'jornada') renderJornada();
        if(id === 'timeline') renderTimeline();
    }

    async function salvarViagem() {
        const uf = document.getElementById('sel-uf').value;
        const cidade = document.getElementById('txt-cidade').value;
        const rawDate = document.getElementById('txt-data').value;
        if(!cidade || !rawDate) return alert("Preencha!");
        const files = document.getElementById('inp-foto').files;
        let fotos = []; for (let i = 0; i < Math.min(files.length, 3); i++) { fotos.push(await converter(files[i])); }
        const trip = { 
            cidade, uf, data: rawDate.split('-').reverse().join('/'), rawDate, fotos, 
            h: parseFloat(document.getElementById('v-hosp').value || 0), 
            t: parseFloat(document.getElementById('v-trans').value || 0),
            al: parseFloat(document.getElementById('v-alime').value || 0),
            at: parseFloat(document.getElementById('v-atrac').value || 0),
            total: (parseFloat(document.getElementById('v-hosp').value || 0) + parseFloat(document.getElementById('v-trans').value || 0) + parseFloat(document.getElementById('v-alime').value || 0) + parseFloat(document.getElementById('v-atrac').value || 0)), 
            praia: document.getElementById('chk-praia').checked 
        };
        let db = JSON.parse(localStorage.getItem('viagens_vFinal_v2')) || {};
        if(!db[uf]) db[uf] = []; db[uf].unshift(trip);
        localStorage.setItem('viagens_vFinal_v2', JSON.stringify(db));
        location.reload();
    }

    function renderTimeline() {
        const db = JSON.parse(localStorage.getItem('viagens_vFinal_v2')) || {};
        let todas = []; for(let uf in db) db[uf].forEach(v => todas.push(v));
        todas.sort((a,b) => new Date(b.rawDate) - new Date(a.rawDate));
        let html = '';
        todas.forEach(v => {
            html += `<div class="timeline-item"><div class="t-dot"></div><div class="t-card"><span style="font-size:11px; font-weight:800; color:var(--text-sub)">${v.cidade} - ${v.data}</span><h4 style="margin:5px 0; color:var(--money)">R$ ${v.total.toFixed(2)}</h4>${v.fotos[0] ? `<img src="${v.fotos[0]}" style="width:100%; height:160px; object-fit:cover; border-radius:18px;">` : ''}</div></div>`;
        });
        document.getElementById('timeline-list').innerHTML = html || '<p style="text-align:center;padding:20px;">Sem memórias.</p>';
    }

    function renderGastos() {
        const db = JSON.parse(localStorage.getItem('viagens_vFinal_v2')) || {};
        let html = '', totalGeral = 0;
        for (const uf in db) {
            let totalUF = 0, cidadesHtml = '';
            db[uf].forEach(c => {
                totalUF += c.total;
                cidadesHtml += `<div class="gasto-entry"><div class="cidade-data-row"><span>${c.cidade} - ${c.data}</span><strong style="color:var(--money)">R$ ${c.total.toFixed(2)}</strong></div><div style="display:flex; gap:6px;"><div class="pill">🏨 ${c.h.toFixed(0)}</div><div class="pill">🚗 ${c.t.toFixed(0)}</div><div class="pill">🍴 ${c.al.toFixed(0)}</div><div class="pill">🎡 ${c.at.toFixed(0)}</div></div></div>`;
            });
            totalGeral += totalUF;
            html += `<div class="resumo-uf-card"><div class="uf-header"><span>🚩 ${uf.replace('BR','')}</span><span style="color:var(--money)">R$ ${totalUF.toFixed(2)}</span></div>${cidadesHtml}</div>`;
        }
        document.getElementById('lista-detalhada-gastos').innerHTML = html || '<p style="text-align:center;padding:20px;">Sem gastos.</p>';
        document.getElementById('total-geral-brasil').innerText = `Total Brasil: R$ ${totalGeral.toFixed(2)}`;
    }

    function renderJornada() {
        const db = JSON.parse(localStorage.getItem('viagens_vFinal_v2')) || {};
        const visitados = Object.keys(db); let html = '';
        const metas = [{n:1, l:'Início', i:'🌱'}, {n:5, l:'5 Estados', i:'🏃'}, {n:26, l:'Brasil', i:'👑'}];
        metas.forEach(m => {
            const ok = visitados.length >= m.n;
            html += `<div class="badge ${ok ? 'active' : ''}"><div class="b-icon">${m.i}</div><div style="font-size:8px;font-weight:800">${m.l}</div></div>`;
        });
        document.getElementById('grid-conquistas').innerHTML = html;
    }

    function abrirHistorico(id) {
        const db = JSON.parse(localStorage.getItem('viagens_vFinal_v2')) || {};
        const lista = db[id];
        const dataMap = simplemaps_countrymap_mapdata.state_specific[id];
        const nome = dataMap ? dataMap.name : id.replace('BR','');
        if(!lista) return;

        let h = `<h2 style="color:var(--primary); margin:0 0 15px 0;">🚩 ${nome}</h2>`;
        lista.forEach((v, cIdx) => {
            let track = ''; v.fotos.forEach(f => { track += `<img src="${f}" class="img-slide">`; });
            h += `<div style="margin-bottom:30px; border-bottom:1px solid #eee; padding-bottom:15px;">
                <p style="margin:0; font-size:14px; font-weight:800; color:var(--text-sub);">${v.cidade} - ${v.data}</p>
                <h4 style="margin:5px 0 10px 0; color:var(--money)">R$ ${v.total.toFixed(2)}</h4>
                <div class="carousel-fotos" id="car-${cIdx}" ontouchstart="hTS(event)" ontouchmove="hTM(event, ${cIdx}, ${v.fotos.length})">
                    <div class="track-fotos">${track || '<div class="img-slide" style="background:#eee"></div>'}</div>
                </div>
            </div>`;
        });
        document.getElementById('popup-content').innerHTML = h;
        document.getElementById('photo-popup').classList.add('show');
        document.getElementById('popup-overlay').style.display = 'block';
    }

    let sX = 0; function hTS(e) { sX = e.touches[0].clientX; }
    function hTM(e, cIdx, len) { if (!sX) return; let d = sX - e.touches[0].clientX; let tr = document.querySelector(`#car-${cIdx} .track-fotos`); let curIdx = Math.round(Math.abs(new WebKitCSSMatrix(window.getComputedStyle(tr).transform).m41 / tr.offsetWidth)); if (Math.abs(d) > 40) { if (d > 0 && curIdx < len - 1) curIdx++; else if (d < 0 && curIdx > 0) curIdx--; tr.style.transform = `translateX(-${curIdx * 100}%)`; sX = 0; } }

    function fecharPopup() { document.getElementById('photo-popup').classList.remove('show'); document.getElementById('popup-overlay').style.display = 'none'; }
    function atualizarInterface() {
        const db = JSON.parse(localStorage.getItem('viagens_vFinal_v2')) || {};
        Object.keys(db).forEach(u => {
            const el = document.getElementById(u);
            if(el) {
                let cor = '#ccc';
                for (let r in REGIOES) { if(REGIOES[r].UFs.includes(u)) cor = REGIOES[r].color; }
                el.style.fill = cor;
            }
        });
        document.getElementById('info').innerText = `ESTADOS CONQUISTADOS: ${Object.keys(db).length}`;
    }
    function converter(f) { return new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => { const img = new Image(); img.src = rd.result; img.onload = () => { const cv = document.createElement('canvas'); const ctx = cv.getContext('2d'); cv.width = 600; cv.height = 600 * (img.height/img.width); ctx.drawImage(img, 0, 0, cv.width, cv.height); r(cv.toDataURL('image/jpeg', 0.6)); }; }; }); }
    init();
</script>
</body>
</html>
