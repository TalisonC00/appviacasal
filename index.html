<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Mapa: Edição Brasil 🇧🇷</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --primary: #ff4b5c; }
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; overflow: hidden; }
        
        #map { height: 100vh; width: 100vw; }

        /* Estilo dos Menus */
        .controles { 
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 90%; max-width: 400px;
        }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        
        input, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }

        /* Ajuste do Pop-up para fotos */
        .leaflet-popup-content img { width: 100%; border-radius: 5px; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="controles">
        <div class="card" id="form-viagem">
            <input type="text" id="cidade" placeholder="Cidade e Estado (ex: Ubatuba, SP)">
            <input type="file" id="foto1" accept="image/*" style="display:none">
            <button onclick="registrarViagem()">Marcar nossa história 📌</button>
        </div>
    </div>

    <div id="map"></div>

    <script>
        // 1. LIMITES GEOGRÁFICOS DO BRASIL (Aprox.)
        const cantoSuperiorEsquerdo = [5.27, -73.99];
        const cantoInferiorDireito = [-33.75, -34.79];
        const limitesBrasil = L.latLngBounds(cantoSuperiorEsquerdo, cantoInferiorDireito);

        // 2. INICIALIZAR MAPA RESTRITO
        var map = L.map('map', {
            maxBounds: limitesBrasil,      // Prende o mapa no Brasil
            maxBoundsViscosity: 1.0,      // Impede totalmente de arrastar para fora
            minZoom: 4,                   // Não deixa ver o mundo todo
            maxZoom: 18                   // Permite ver as ruas
        }).setView([-15.78, -47.93], 4);

        // 3. CAMADA DE MAPA (ESTILO LIMPO)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap',
            bounds: limitesBrasil         // Só carrega os quadrados do Brasil
        }).addTo(map);

        // 4. CARREGAR PINOS SALVOS
        window.onload = function() {
            const viagens = JSON.parse(localStorage.getItem('viagens_casal_mapa')) || [];
            viagens.forEach(v => {
                L.marker([v.lat, v.lng]).addTo(map).bindPopup(`<b>${v.cidade}</b><br>Nossa Memória aqui!`);
            });
        };

        // 5. REGISTRAR NOVA VIAGEM
        async function registrarViagem() {
            const cidade = document.getElementById('cidade').value;
            if(!cidade) return alert("Escreva o nome da cidade!");

            // Busca as coordenadas (Geocoding)
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${cidade}&countrycodes=br`);
                const data = await res.json();

                if(data.length > 0) {
                    const lat = data[0].lat;
                    const lng = data[0].lon;

                    // Adiciona pino e centraliza
                    L.marker([lat, lng]).addTo(map).bindPopup(`<b>${cidade}</b>`).openPopup();
                    map.setView([lat, lng], 10);

                    // Salva
                    const viagens = JSON.parse(localStorage.getItem('viagens_casal_mapa')) || [];
                    viagens.push({ lat, lng, cidade });
                    localStorage.setItem('viagens_casal_mapa', JSON.stringify(viagens));

                    document.getElementById('cidade').value = "";
                } else {
                    alert("Cidade não encontrada no Brasil. Tente adicionar o Estado (ex: , SP)");
                }
            } catch (e) {
                alert("Erro ao buscar localização. Verifique sua internet.");
            }
        }
    </script>
</body>
</html>
