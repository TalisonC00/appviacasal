<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nossa Jornada 👩‍❤️‍👨</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --primary: #FF4B5C; --sky: #BAE6FD; --card: #FFFFFF; --text-main: #1E293B; --text-sub: #64748B; --money: #10B981; }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--sky); margin: 0; padding: 0; overflow: hidden; touch-action: none; color: var(--text-main); }
        .header { background: #fff; padding: 15px 16px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.03); position: relative; z-index: 100; }
        .header h3 { margin: 0; font-size: 18px; color: var(--primary) !important; font-weight: 800; }
        #info { font-size: 10px; font-weight: 800; color: #000; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; display: block; }

        .aba { display: none; width: 100%; height: calc(100vh - 155px); overflow-y: auto; padding-bottom: 50px; -webkit-overflow-scrolling: touch; }
        .ativa { display: block; }
        .card { background: var(--card); padding: 20px; margin: 16px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); }

        /* MAPA */
        .mapa-card { background: var(--card); margin: 16px; border-radius: 28px; height: calc(100% - 32px); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        #svg-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #fff; }
        path { fill: #F1F5F9; stroke: #fff; stroke-width: 0.8; transition: 0.5s; cursor: pointer; }
        
        .visitado[id^="BRAC"], .visitado[id^="BRAM"], .visitado[id^="BRRR"], .visitado[id^="BRRO"], .visitado[id^="BRPA"], .visitado[id^="BRAP"], .visitado[id^="BRTO"] { fill: #22C55E !important; }
        .visitado[id^="BRMA"], .visitado[id^="BRPI"], .visitado[id^="BRCE"], .visitado[id^="BRRN"], .visitado[id^="BRPB"], .visitado[id^="BRPE"], .visitado[id^="BRAL"], .visitado[id^="BRSE"], .visitado[id^="BRBA"] { fill: #FACC15 !important; }
        .visitado[id^="BRMT"], .visitado[id^="BRMS"], .visitado[id^="BRGO"], .visitado[id^="BRDF"] { fill: #FB923C !important; }
        .visitado[id^="BRMG"], .visitado[id^="BRSP"], .visitado[id^="BRRJ"], .visitado[id^="BRES"] { fill: #EC4899 !important; }
        .visitado[id^="BRPR"], .visitado[id^="BRSC"], .visitado[id^="BRRS"] { fill: #A855F7 !important; }

        /* TIMELINE */
        .timeline-container { padding: 10px 5px; position: relative; }
        .timeline-line { position: absolute; left: 33px; top: 60px; bottom: 20px; width: 3px; background: rgba(255,255,255,0.8); z-index: 0; border-radius: 10px; }
        .timeline-item { display: flex; gap: 15px; margin-bottom: 25px; position: relative; z-index: 2; margin-left: 20px; margin-right: 16px; }
        .t-dot { min-width: 14px; height: 14px; background: var(--primary); border: 3px solid #fff; border-radius: 50%; margin-top: 6px; z-index: 3; box-shadow: 0 0 0 2px rgba(255,75,92,0.1); }
        .t-card { background: #fff; padding: 18px; border-radius: 24px; flex: 1; box-shadow: 0 8px 25px rgba(0,0,0,0.04); border: 1px solid #f8fafc; }

        /* GASTOS */
        .resumo-uf-card { background: #fff; border-radius: 24px; padding: 24px; margin-bottom: 24px; border: 1.5px solid #F1F5F9; }
        .uf-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f8fafc; padding-bottom: 12px; margin-bottom: 12px; font-weight: 800; font-size: 16px; }
        .gasto-entry { padding: 20px 0; border-bottom: 1px solid #f8fafc; }
        .gasto-entry:last-child { border-bottom: none; }
        .cidade-data-row { display: flex; justify-content: space-between; font-size: 12px; font-weight: 700; color: var(--text-main); margin-bottom: 10px; }
        .pill { background: #F8FAFC; padding: 6px 10px; border-radius: 10px; font-size: 10px; font-weight: 700; color: var(--text-sub); display: flex; align-items: center; gap: 4px; border: 1px solid #eee; }

        /* CONQUISTAS */
        .badge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; justify-items: center; }
        .badge { display: flex; flex-direction: column; align-items: center; width: 80px; opacity: 0.15; filter: grayscale(1); transition: 0.4s; cursor: pointer; }
        .badge.active { opacity: 1; filter: grayscale(0); transform: scale(1.05); }
        .b-icon { width: 52px; height: 52px; background: #F1F5F9; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 6px; }
        .badge-name { font-size: 9px; font-weight: 800; color: var(--text-sub); text-align: center; text-transform: uppercase; }

        /* FORMULÁRIO */
        input, select { width: 100%; padding: 14px; border-radius: 14px; border: 1.5px solid #F1F5F9; font-family: inherit; background: #F8FAFC; box-sizing: border-box; }
        label { font-size: 10px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; margin: 12px 0 4px 4px; display: block; }
        .btn-acao { background: var(--money); color: #fff; border: none; padding: 16px; border-radius: 18px; width: 100%; font-weight: 800; margin-top: 15px; cursor: pointer; }

        /* POP-UP */
        #photo-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); background: #fff; padding: 24px; border-radius: 32px; box-shadow: 0 25px 60px rgba(0,0,0,0.3); z-index: 2100; width: 90%; max-width: 340px; opacity: 0; visibility: hidden; transition: 0.3s; }
        #photo-popup.show { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
        .popup-scroll { max-height: 480px; overflow-y: auto; text-align: left; }
        .carousel-fotos { position: relative; width: 100%; overflow: hidden; border-radius: 20px; margin: 10px 0; height: 180px; background: #f1f5f9; }
        .track-fotos { display: flex; transition: transform 0.4s ease; height: 100%; }
        .img-slide { min-width: 100%; height: 100%; object-fit: cover; }
        .close-popup { position: absolute; top: 12px; right: 12px; background: var(--primary); color: white; border: none; border-radius: 50%; width: 30px; height: 30px; font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 3000 !important; cursor: pointer; }

        /* MENU NAV */
        .menu-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; display: flex; height: 55px; border-top-left-radius: 28px; border-top-right-radius: 28px; z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
        .btn-aba { flex: 1; border: none; background: none; font-size: 18px; color: #CBD5E1; cursor: pointer; outline: none; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        .btn-aba.active { color: var(--primary); transform: translateY(-5px); }
    </style>
</head>
<body>
    <div class="header"><h3>Nossa Jornada 👩‍❤️‍👨</h3><span id="info">ESTADOS CONQUISTADOS: 0</span></div>
    <div id="popup-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:2000;display:none;backdrop-filter:blur(4px);" onclick="fecharPopup()"></div>
    <div id="photo-popup"><button class="close-popup" onclick="fecharPopup()">✕</button><div id="popup-content" class="popup-scroll"></div></div>
    
    <div id="aba-mapa" class="aba ativa"><div class="mapa-card"><div id="svg-container"></div></div></div>
    
    <div id="aba-timeline" class="aba">
        <div class="timeline-container">
            <h3 style="margin: 0 0 25px 20px; color: var(--primary); display: flex; align-items: center; gap: 8px; position: relative; z-index: 5;">📅 Timeline</h3>
            <div class="timeline-line"></div>
            <div id="timeline-list"></div>
        </div>
    </div>
    
    <div id="aba-jornada" class="aba"><div class="card"><h3>🏆 Conquistas</h3><div class="badge-grid" id="grid-conquistas"></div></div></div>
    
    <div id="aba-registro" class="aba">
        <div class="card">
            <h3>📍 Nova Memória</h3>
            <label>Estado</label>
            <select id="sel-uf">
                <option value="BRSP" selected>São Paulo</option><option value="BRRJ">Rio de Janeiro</option><option value="BRMG">Minas Gerais</option><option value="BRBA">Bahia</option><option value="BRSC">Santa Catarina</option><option value="BRPR">Paraná</option><option value="BRRS">Rio Grande do Sul</option><option value="BRGO">Goiás</option><option value="BRDF">Distrito Federal</option><option value="BRES">Espírito Santo</option><option value="BRCE">Ceará</option><option value="BRPE">Pernambuco</option><option value="BRRN">Rio Grande do Norte</option><option value="BRPB">Paraíba</option><option value="BRAL">Alagoas</option><option value="BRSE">Sergipe</option><option value="BRMA">Maranhão</option><option value="BRPI">Piauí</option><option value="BRMT">Mato Grosso</option><option value="BRMS">Mato Grosso do Sul</option><option value="BRTO">Tocantins</option><option value="BRPA">Pará</option><option value="BRAM">Amazonas</option><option value="BRRO">Rondônia</option><option value="BRAC">Acre</option><option value="BRRR">Roraima</option><option value="BRAP">Amapá</option>
            </select>
            <label>Cidade</label><input type="text" id="txt-cidade" placeholder="Ex: Gramado">
            <label>Data da Visita</label><input type="date" id="txt-data">
            <label style="display:flex; align-items:center; gap:8px; margin:15px 0;"><input type="checkbox" id="chk-praia" style="width:18px;height:18px;"><span style="font-size:12px; font-weight:800; color:var(--text-sub)">VIAGEM DE PRAIA? 🏖️</span></label>
            <label>Gastos (R$)</label>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"><input type="number" id="v-hosp" placeholder="Hotel"><input type="number" id="v-trans" placeholder="Transp."></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:8px;"><input type="number" id="v-alime" placeholder="Comida"><input type="number" id="v-atrac" placeholder="Atrações"></div>
            <label>Fotos (Máx 3)</label><input type="file" id="inp-foto" accept="image/*" multiple>
            <button class="btn-acao" onclick="salvarViagem()">Salvar Memória🚩</button>
        </div>
    </div>

    <div id="aba-gastos" class="aba">
        <div class="card" style="padding:20px 16px;">
            <h3>💰 Relatório</h3>
            <div id="lista-detalhada-gastos"></div>
            <div style="background:var(--money); color:#fff; padding:18px; border-radius:22px; text-align:center; font-weight:800; font-size:16px; margin:25px 0 5px 0;" id="total-geral-brasil">Total Brasil: R$ 0,00</div>
        </div>
    </div>

    <nav class="menu-nav">
        <button class="btn-aba active" onclick="trocarAba('mapa', this)">🗺️</button>
        <button class="btn-aba" onclick="trocarAba('timeline', this)">🕒</button>
        <button class="btn-aba" onclick="trocarAba('jornada', this)">🏆</button>
        <button class="btn-aba" onclick="trocarAba('registro', this)">➕</button>
        <button class="btn-aba" onclick="trocarAba('gastos', this)">💰</button>
    </nav>

<script>
    // --- CONFIGURAÇÃO FIREBASE ---
    const firebaseConfig = {
  apiKey: "AIzaSyDCAP09SYTF589nXB3Xu5Q20d8ai0N_WgQ",
  authDomain: "appviacasal.firebaseapp.com",
  databaseURL: "https://appviacasal-default-rtdb.firebaseio.com",
  projectId: "appviacasal",
  storageBucket: "appviacasal.firebasestorage.app",
  messagingSenderId: "124096832260",
  appId: "1:124096832260:web:827591aff876c4185a6651"
};
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const REGIOES = {
        'NORTE': { icon: '🌳', color: '#22C55E', UFs: ['BRAC','BRAM','BRRR','BRRO','BRPA','BRAP','BRTO'], nomes: ['Acre','Amazonas','Roraima','Rondônia','Pará','Amapá','Tocantins'] },
        'NORDESTE': { icon: '🌵', color: '#FACC15', UFs: ['BRMA','BRPI','BRCE','BRRN','BRPB','BRPE','BRAL','BRSE','BRBA'], nomes: ['Maranhão','Piauí','Ceará','Rio Grande do Norte','Paraíba','Pernambuco','Alagoas','Sergipe','Bahia'] },
        'CENTRO': { icon: '☀️', color: '#FB923C', UFs: ['BRMT','BRMS','BRGO','BRDF'], nomes: ['Mato Grosso','Mato Grosso do Sul','Goiás','Distrito Federal'] },
        'SUDESTE': { icon: '🏢', color: '#EC4899', UFs: ['BRMG','BRSP','BRRJ','BRES'], nomes: ['Minas Gerais','São Paulo','Rio de Janeiro','Espírito Santo'] },
        'SUL': { icon: '❄️', color: '#A855F7', UFs: ['BRPR','BRSC','BRRS'], nomes: ['Paraná','Santa Catarina','Rio Grande do Sul'] }
    };

    // Variável global para armazenar os dados vindo da nuvem
    let dbGlobal = {};

    async function init() {
        const res = await fetch('br.svg');
        const svg = await res.text();
        document.getElementById('svg-container').innerHTML = svg;
        const svgEl = document.querySelector('#svg-container svg');
        svgEl.id = "mapa-svg-real"; svgEl.style.width = "100%"; svgEl.style.height = "100%";
        svgPanZoom('#mapa-svg-real', { zoomEnabled: false, panEnabled: false, controlIconsEnabled: false, fit: true, center: true });
        
        document.getElementById('svg-container').addEventListener('touchend', (e) => {
            const target = e.target.closest('path');
            if (target && target.id) abrirHistorico(target.id);
        });

        // ESCUTAR MUDANÇAS NA NUVEM EM TEMPO REAL
        database.ref('viagens').on('value', (snapshot) => {
            dbGlobal = snapshot.val() || {};
            atualizarInterface();
            // Atualiza as abas se estiverem abertas
            renderTimeline();
            renderGastos();
            renderJornada();
        });
    }

    function trocarAba(id, btn) {
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.querySelectorAll('.btn-aba').forEach(b => b.classList.remove('active'));
        document.getElementById('aba-' + id).classList.add('ativa');
        btn.classList.add('active');
        if(id === 'gastos') renderGastos();
        if(id === 'jornada') renderJornada();
        if(id === 'timeline') renderTimeline();
    }

    async function salvarViagem() {
        const elUf = document.getElementById('sel-uf');
        const elCidade = document.getElementById('txt-cidade');
        const elData = document.getElementById('txt-data');
        const elHosp = document.getElementById('v-hosp');
        const elTrans = document.getElementById('v-trans');
        const elAlime = document.getElementById('v-alime');
        const elAtrac = document.getElementById('v-atrac');
        const elFoto = document.getElementById('inp-foto');
        const elPraia = document.getElementById('chk-praia');

        if (!elCidade.value.trim()) return alert("Por favor, digite o nome da cidade.");
        if (!elData.value) return alert("A data da visita é obrigatória.");
        
        const h = parseFloat(elHosp.value) || 0;
        const t = parseFloat(elTrans.value) || 0;
        const al = parseFloat(elAlime.value) || 0;
        const at = parseFloat(elAtrac.value) || 0;

        if (h < 0 || t < 0 || al < 0 || at < 0) return alert("Valores negativos não permitidos!");

        const files = elFoto.files;
        let fotos = []; 
        for (let i = 0; i < Math.min(files.length, 3); i++) { fotos.push(await converter(files[i])); }

        const trip = {
            cidade: elCidade.value,
            uf: elUf.value,
            data: elData.value.split('-').reverse().join('/'),
            rawDate: elData.value,
            fotos, h, t, al, at,
            praia: elPraia.checked,
            total: h + t + al + at,
            timestamp: Date.now() // Importante para ordenar a timeline
        };

        // SALVAR NO FIREBASE (NUVEM)
        database.ref('viagens/' + elUf.value).push(trip).then(() => {
            elCidade.value = ""; elData.value = ""; elHosp.value = ""; elTrans.value = "";
            elAlime.value = ""; elAtrac.value = ""; elFoto.value = ""; elPraia.checked = false;
            alert("Memória salva!");
            trocarAba('mapa', document.querySelector('.btn-aba'));
        });
    }

    function removerViagem(uf, idFirebase, cidade) {
        if (!confirm(`Deseja apagar a memória de ${cidade}?`)) return;
        database.ref('viagens/' + uf + '/' + idFirebase).remove();
    }

    function renderTimeline() {
        let todas = [];
        for(let uf in dbGlobal) {
            for(let id in dbGlobal[uf]) {
                todas.push({ ...dbGlobal[uf][id], idFirebase: id });
            }
        }
        todas.sort((a,b) => new Date(b.rawDate) - new Date(a.rawDate));
        
        let html = '';
        todas.forEach(v => {
            html += `
            <div class="timeline-item">
                <div class="t-dot"></div>
                <div class="t-card" style="position: relative;">
                    <button onclick="removerViagem('${v.uf}', '${v.idFirebase}', '${v.cidade}')" 
                            style="position: absolute; top: 10px; right: 10px; border: none; background: #fee2e2; color: #ef4444; border-radius: 8px; padding: 5px; cursor: pointer; font-size: 14px;">
                        🗑️
                    </button>
                    <span style="font-size:11px; font-weight:800; color:var(--text-sub)">${v.cidade} - ${v.data}</span>
                    <h4 style="margin:6px 0; color:var(--money); font-size:16px;">R$ ${v.total.toFixed(2)}</h4>
                    ${v.fotos[0] ? `<img src="${v.fotos[0]}" style="width:100%; height:160px; object-fit:cover; border-radius:18px; margin-top:8px;">` : ''}
                </div>
            </div>`;
        });
        document.getElementById('timeline-list').innerHTML = html || '<p style="text-align:center;padding:20px;color:#999">Sem memórias ainda.</p>';
    }

    function renderGastos() {
        let html = '', totalGeral = 0;
        for (const uf in dbGlobal) {
            let totalUF = 0, cidadesHtml = '';
            for(let id in dbGlobal[uf]) {
                const c = dbGlobal[uf][id];
                totalUF += c.total;
                cidadesHtml += `<div class="gasto-entry"><div class="cidade-data-row"><span>${c.cidade} - ${c.data}</span><strong style="color:var(--money)">R$ ${c.total.toFixed(2)}</strong></div><div style="display:flex; flex-wrap:wrap; gap:6px;"><div class="pill">🏨 ${c.h.toFixed(0)}</div><div class="pill">🚗 ${c.t.toFixed(0)}</div><div class="pill">🍴 ${c.al.toFixed(0)}</div><div class="pill">🎡 ${c.at.toFixed(0)}</div></div></div>`;
            }
            totalGeral += totalUF;
            html += `<div class="resumo-uf-card"><div class="uf-header"><span>🚩 ${uf.replace('BR','')}</span><span style="color:var(--money)">R$ ${totalUF.toFixed(2)}</span></div>${cidadesHtml}</div>`;
        }
        document.getElementById('lista-detalhada-gastos').innerHTML = html || '<p style="text-align:center;padding:20px;color:#999">Sem gastos.</p>';
        document.getElementById('total-geral-brasil').innerText = `Total Brasil: R$ ${totalGeral.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
    }

    function renderJornada() {
        const visitados = Object.keys(dbGlobal);
        let html = '';
        const metas = [{n:1, l:'Início', i:'🌱'}, {n:5, l:'5 Estados', i:'🏃'}, {n:10, l:'10 Estados', i:'⭐'}, {n:20, l:'20 Estados', i:'🔥'}, {n:26, l:'Brasil', i:'👑'}];
        metas.forEach(m => {
            const ok = visitados.length >= m.n;
            html += `<div class="badge ${ok ? 'active' : ''}" onclick="if(!${ok}) alert('Faltam ${m.n - visitados.length} estados!')"><div class="b-icon">${m.i}</div><div class="badge-name">${m.l}</div></div>`;
        });
        
        let temPraia = false; 
        for(let u in dbGlobal) {
            for(let id in dbGlobal[u]) { if(dbGlobal[u][id].praia) temPraia = true; }
        }
        
        html += `<div class="badge ${temPraia ? 'active' : ''}" onclick="if(!${temPraia}) alert('Visite uma praia para liberar!')"><div class="b-icon">🏖️</div><div class="badge-name">Pé na areia</div></div>`;
        
        for(let r in REGIOES) {
            const reg = REGIOES[r]; 
            const vNaReg = reg.UFs.filter(u => visitados.includes(u)); 
            const ok = vNaReg.length === reg.UFs.length;
            html += `<div class="badge ${ok ? 'active' : ''}" onclick="msgRegiao('${r}', ${ok})"><div class="b-icon" style="${ok ? 'background:'+reg.color+';color:#fff' : ''}">${reg.icon}</div><div class="badge-name">${r}</div></div>`;
        }
        document.getElementById('grid-conquistas').innerHTML = html;
    }

    function msgRegiao(r, ok) { 
        if(ok) return; 
        const faltantes = REGIOES[r].nomes.filter((n, i) => !Object.keys(dbGlobal).includes(REGIOES[r].UFs[i])); 
        alert(`Faltam no ${r}: ${faltantes.join(', ')}`); 
    }

    function abrirHistorico(id) {
        const listaObj = dbGlobal[id]; if (!listaObj) return;
        let h = `<h2 style="color:var(--primary); margin:0 0 20px 0; font-size:22px;">🚩 ${id.replace('BR','')}</h2>`;
        
        Object.keys(listaObj).forEach((idFirebase) => {
            const v = listaObj[idFirebase];
            let track = ''; v.fotos.forEach(f => { track += `<img src="${f}" class="img-slide">`; });
            h += `<div style="margin-bottom:30px; border-bottom:1px solid #eee; padding-bottom:20px;">
                <p style="margin:0; font-size:14px; font-weight:800; color:var(--text-sub);">${v.cidade} - ${v.data}</p>
                <h4 style="margin:6px 0 12px 0; color:var(--money); font-size:18px;">R$ ${v.total.toFixed(2)}</h4>
                <div class="carousel-fotos" id="car-${idFirebase}" ontouchstart="hTS(event)" ontouchmove="hTM(event, '${idFirebase}', ${v.fotos.length})">
                    <div class="track-fotos">${track || '<div class="img-slide" style="background:#eee"></div>'}</div>
                </div>
            </div>`;
        });
        document.getElementById('popup-content').innerHTML = h;
        document.getElementById('photo-popup').classList.add('show');
        document.getElementById('popup-overlay').style.display = 'block';
    }

    let sX = 0; function hTS(e) { sX = e.touches[0].clientX; }
    function hTM(e, idF, len) { if (!sX) return; let d = sX - e.touches[0].clientX; let tr = document.querySelector(`#car-${idF} .track-fotos`); let curIdx = Math.round(Math.abs(new WebKitCSSMatrix(window.getComputedStyle(tr).transform).m41 / tr.offsetWidth)); if (Math.abs(d) > 40) { if (d > 0 && curIdx < len - 1) curIdx++; else if (d < 0 && curIdx > 0) curIdx--; tr.style.transform = `translateX(-${curIdx * 100}%)`; sX = 0; } }

    function fecharPopup() { document.getElementById('photo-popup').classList.remove('show'); document.getElementById('popup-overlay').style.display = 'none'; }
    
    function atualizarInterface() { 
        document.querySelectorAll('path').forEach(p => p.classList.remove('visitado'));
        Object.keys(dbGlobal).forEach(u => { const el = document.getElementById(u); if(el) el.classList.add('visitado'); }); 
        document.getElementById('info').innerText = `ESTADOS CONQUISTADOS: ${Object.keys(dbGlobal).length}`; 
    }
    
    function converter(f) { return new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => { const img = new Image(); img.src = rd.result; img.onload = () => { const cv = document.createElement('canvas'); const ctx = cv.getContext('2d'); cv.width = 600; cv.height = 600 * (img.height/img.width); ctx.drawImage(img, 0, 0, cv.width, cv.height); r(cv.toDataURL('image/jpeg', 0.6)); }; }; }); }
    init();
</script>
</body>
