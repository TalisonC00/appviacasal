<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nossa Jornada 👩‍❤️‍👨</title>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { 
            --primary: #FF4B5C; 
            --sky: #BAE6FD; 
            --card: #FFFFFF; 
            --text-main: #1E293B; 
            --text-sub: #64748B; 
            --money: #10B981; 
        }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--sky); margin: 0; padding: 0; overflow: hidden; touch-action: none; color: var(--text-main); }
        
        .header { background: #fff; padding: 20px 16px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.03); position: relative; z-index: 100; }
        .header h3 { margin: 0; font-size: 20px; color: var(--primary) !important; font-weight: 800; }
        #info { font-size: 12px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; display: block; }
        
        .aba { display: none; width: 100%; height: calc(100vh - 175px); overflow-y: auto; padding-bottom: 60px; }
        .ativa { display: block; }
        
        .card { background: var(--card); padding: 24px; margin: 20px 16px; border-radius: 32px; box-shadow: 0 12px 40px rgba(0,0,0,0.06); }
        
        /* MAPA */
        .mapa-card { background: var(--card); margin: 16px; border-radius: 28px; height: calc(100% - 32px); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        #svg-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #fff; }
        path { fill: #F1F5F9; stroke: #fff; stroke-width: 0.8; transition: all 0.5s ease; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        
        /* CORES REGIÕES */
        .visitado[id^="BRAC"], .visitado[id^="BRAM"], .visitado[id^="BRRR"], .visitado[id^="BRRO"], .visitado[id^="BRPA"], .visitado[id^="BRAP"], .visitado[id^="BRTO"] { fill: #22C55E !important; }
        .visitado[id^="BRMA"], .visitado[id^="BRPI"], .visitado[id^="BRCE"], .visitado[id^="BRRN"], .visitado[id^="BRPB"], .visitado[id^="BRPE"], .visitado[id^="BRAL"], .visitado[id^="BRSE"], .visitado[id^="BRBA"] { fill: #FACC15 !important; }
        .visitado[id^="BRMT"], .visitado[id^="BRMS"], .visitado[id^="BRGO"], .visitado[id^="BRDF"] { fill: #FB923C !important; }
        .visitado[id^="BRMG"], .visitado[id^="BRSP"], .visitado[id^="BRRJ"], .visitado[id^="BRES"] { fill: #EC4899 !important; }
        .visitado[id^="BRPR"], .visitado[id^="BRSC"], .visitado[id^="BRRS"] { fill: #A855F7 !important; }

        /* FORMULÁRIO */
        input, select { width: 100%; padding: 16px; margin: 8px 0; border-radius: 16px; border: 1.5px solid #F1F5F9; font-family: inherit; font-size: 15px; box-sizing: border-box; background: #F8FAFC; outline: none; }
        label { font-size: 12px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; margin-top: 14px; display: block; margin-left: 4px; }
        .btn-acao { background: var(--primary); color: #fff; border: none; padding: 18px; border-radius: 20px; width: 100%; font-weight: 800; font-size: 16px; margin-top: 20px; box-shadow: 0 8px 20px rgba(255, 75, 92, 0.2); cursor: pointer; }

        /* GASTOS */
        .resumo-uf-card { background: #fff; border-radius: 24px; padding: 20px; margin-bottom: 16px; border: 1.5px solid #F1F5F9; }
        .header-relatorio { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .uf-tag { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 18px; }
        .uf-total { color: var(--money); font-weight: 800; font-size: 18px; }
        .cidade-financeiro { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed #F1F5F9; }
        .cidade-nome-row { display: flex; justify-content: space-between; font-weight: 700; font-size: 14px; margin-bottom: 8px; }
        .categoria-pills { display: flex; flex-wrap: wrap; gap: 6px; }
        .pill { background: #F8FAFC; padding: 6px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; color: var(--text-sub); display: flex; align-items: center; gap: 4px; }

        /* CONQUISTAS */
        .badge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 10px; }
        .badge { text-align: center; opacity: 0.2; filter: grayscale(1); transition: 0.5s; }
        .badge.active { opacity: 1; filter: grayscale(0); transform: scale(1.1); }
        .badge-icon { font-size: 32px; background: #F1F5F9; width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; border-radius: 50%; margin: 0 auto 8px; }
        .badge-name { font-size: 10px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; }

        /* POP-UP CARROSSEL */
        #photo-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); background: #fff; padding: 24px; border-radius: 32px; box-shadow: 0 25px 60px rgba(0,0,0,0.3); z-index: 2100; width: 90%; max-width: 340px; text-align: center; opacity: 0; visibility: hidden; transition: 0.3s; }
        #photo-popup.show { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
        .carousel-container { position: relative; width: 100%; height: 200px; margin: 15px 0; border-radius: 20px; overflow: hidden; background: #f1f5f9; }
        .carousel-track { display: flex; transition: transform 0.4s ease; height: 100%; }
        .carousel-item { min-width: 100%; height: 100%; object-fit: cover; }
        .carousel-dots { display: flex; justify-content: center; gap: 6px; margin-top: -25px; position: relative; z-index: 10; padding-bottom: 10px; }
        .dot { width: 6px; height: 6px; background: rgba(255,255,255,0.6); border-radius: 50%; }
        .dot.active { background: #fff; width: 15px; border-radius: 10px; }
        .close-popup { position: absolute; top: -10px; right: -10px; background: var(--primary); color: white; border: none; border-radius: 50%; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; font-size: 22px; z-index: 2200; font-weight: bold; }
        #popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; opacity: 0; visibility: hidden; transition: 0.3s; backdrop-filter: blur(4px); }
        #popup-overlay.show { opacity: 1; visibility: visible; }

        /* NAV */
        .menu-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.95); backdrop-filter: blur(15px); display: flex; height: 90px; border-top-left-radius: 32px; border-top-right-radius: 32px; z-index: 1000; box-shadow: 0 -10px 40px rgba(0,0,0,0.05); }
        .btn-aba { flex: 1; border: none; background: none; font-size: 26px; color: #CBD5E1; cursor: pointer; transition: 0.3s; }
        .btn-aba.active { color: var(--primary); transform: translateY(-8px); }
    </style>
</head>
<body>
    <div class="header"><h3>Nossa Jornada 👩‍❤️‍👨</h3><span id="info">0 ESTADOS CONQUISTADOS</span></div>
    <div id="popup-overlay" onclick="fecharPopup()"></div>
    <div id="photo-popup"><button class="close-popup" onclick="fecharPopup()">✕</button><div id="popup-content"></div></div>
    
    <div id="aba-mapa" class="aba ativa"><div class="mapa-card"><div id="svg-container"></div></div></div>
    
    <div id="aba-jornada" class="aba">
        <div class="card">
            <h3 style="margin:0 0 20px 0; color:var(--primary)">🏆 Conquistas</h3>
            <div class="badge-grid" id="conquistas-grid">
                <div class="badge" id="b-1"><div class="badge-icon">🌱</div><div class="badge-name">Início</div></div>
                <div class="badge" id="b-5"><div class="badge-icon">🏃</div><div class="badge-name">5 Estados</div></div>
                <div class="badge" id="b-10"><div class="badge-icon">⭐</div><div class="badge-name">10 Estados</div></div>
                <div class="badge" id="b-nordeste"><div class="badge-icon">🌵</div><div class="badge-name">Nordeste</div></div>
                <div class="badge" id="b-sul"><div class="badge-icon">❄️</div><div class="badge-name">Sul</div></div>
                <div class="badge" id="b-brasil"><div class="badge-icon">👑</div><div class="badge-name">Brasil</div></div>
            </div>
        </div>
        <div id="timeline-container"></div>
    </div>

    <div id="aba-registro" class="aba">
        <div class="card">
            <h3 style="margin:0 0 10px 0; color:var(--primary)">📍 Nova Memória</h3>
            <label>Estado</label>
            <select id="sel-uf">
                <option value="BRSP" selected>São Paulo</option><option value="BRRJ">Rio de Janeiro</option><option value="BRMG">Minas Gerais</option><option value="BRBA">Bahia</option><option value="BRSC">Santa Catarina</option><option value="BRPR">Paraná</option><option value="BRRS">Rio Grande do Sul</option><option value="BRGO">Goiás</option><option value="BRDF">Distrito Federal</option><option value="BRES">Espírito Santo</option><option value="BRCE">Ceará</option><option value="BRPE">Pernambuco</option><option value="BRRN">Rio Grande do Norte</option><option value="BRPB">Paraíba</option><option value="BRAL">Alagoas</option><option value="BRSE">Sergipe</option><option value="BRMA">Maranhão</option><option value="BRPI">Piauí</option><option value="BRMT">Mato Grosso</option><option value="BRMS">Mato Grosso do Sul</option><option value="BRTO">Tocantins</option><option value="BRPA">Pará</option><option value="BRAM">Amazonas</option><option value="BRRO">Rondônia</option><option value="BRAC">Acre</option><option value="BRRR">Roraima</option><option value="BRAP">Amapá</option>
            </select>
            <label>Cidade</label><input type="text" id="txt-cidade" placeholder="Ex: Gramado">
            <label>Data da Visita</label><input type="date" id="txt-data">
            <label>Gastos (R$)</label>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <input type="number" id="v-hosp" placeholder="Hotel"><input type="number" id="v-trans" placeholder="Transporte">
                <input type="number" id="v-alime" placeholder="Comida"><input type="number" id="v-atrac" placeholder="Atrações">
            </div>
            <label>Fotos (Até 3)</label><input type="file" id="inp-foto" accept="image/*" multiple>
            <button class="btn-acao" onclick="salvarViagem()">Salvar Memória 🚩</button>
        </div>
    </div>

    <div id="aba-gastos" class="aba">
        <div class="card">
            <h3 style="margin:0 0 20px 0; color:var(--money)">💰 Gastos</h3>
            <div id="lista-detalhada-gastos"></div>
            <div style="background:var(--money); color:#fff; padding:20px; border-radius:24px; text-align:center; font-weight:800; font-size:18px; margin-top:20px;" id="total-geral-brasil">Total: R$ 0,00</div>
        </div>
    </div>

    <nav class="menu-nav">
        <button class="btn-aba active" onclick="trocarAba('mapa', this)">🗺️</button>
        <button class="btn-aba" onclick="trocarAba('jornada', this)">🏆</button>
        <button class="btn-aba" onclick="trocarAba('registro', this)">➕</button>
        <button class="btn-aba" onclick="trocarAba('gastos', this)">💰</button>
    </nav>

<script>
    let panZoomMapa;
    async function init() {
        try {
            const res = await fetch('br.svg');
            const svgText = await res.text();
            document.getElementById('svg-container').innerHTML = svgText;
            const svgEl = document.querySelector('#svg-container svg');
            svgEl.id = "mapa-svg-real";
            svgEl.style.width = "100%"; svgEl.style.height = "100%";
            panZoomMapa = svgPanZoom('#mapa-svg-real', { zoomEnabled: true, controlIconsEnabled: false, fit: true, center: true });
            document.getElementById('svg-container').addEventListener('touchend', (e) => {
                const target = e.target.closest('path');
                if (target && target.id) abrirHistorico(target.id);
            });
            atualizarInterface();
        } catch (e) { console.error(e); }
    }

    function trocarAba(id, btn) {
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.querySelectorAll('.btn-aba').forEach(b => b.classList.remove('active'));
        document.getElementById('aba-' + id).classList.add('ativa');
        btn.classList.add('active');
        if(id === 'gastos') renderGastos();
        if(id === 'jornada') renderJornada();
    }

    async function salvarViagem() {
        const uf = document.getElementById('sel-uf').value;
        const cidade = document.getElementById('txt-cidade').value;
        if(!cidade) return alert("Digite a cidade!");
        const files = document.getElementById('inp-foto').files;
        let fotos = [];
        for (let i = 0; i < Math.min(files.length, 3); i++) { fotos.push(await converter(files[i])); }
        
        const trip = {
            cidade, uf, data: document.getElementById('txt-data').value.split('-').reverse().join('/'), fotos,
            h: parseFloat(document.getElementById('v-hosp').value || 0),
            t: parseFloat(document.getElementById('v-trans').value || 0),
            al: parseFloat(document.getElementById('v-alime').value || 0),
            at: parseFloat(document.getElementById('v-atrac').value || 0)
        };
        trip.total = trip.h + trip.t + trip.al + trip.at;
        
        let db = JSON.parse(localStorage.getItem('viagens_v6_premium')) || {};
        if(!db[uf]) db[uf] = [];
        db[uf].unshift(trip);
        localStorage.setItem('viagens_v6_premium', JSON.stringify(db));
        location.reload();
    }

    function renderJornada() {
        const db = JSON.parse(localStorage.getItem('viagens_v6_premium')) || {};
        const nUfs = Object.keys(db).length;
        const badges = ["b-1", "b-5", "b-10", "b-nordeste", "b-sul", "b-brasil"];
        badges.forEach(id => document.getElementById(id).classList.remove('active'));
        if(nUfs >= 1) document.getElementById('b-1').classList.add('active');
        if(nUfs >= 5) document.getElementById('b-5').classList.add('active');
        if(nUfs >= 10) document.getElementById('b-10').classList.add('active');
        if(nUfs >= 26) document.getElementById('b-brasil').classList.add('active');

        let html = '<h3 style="margin:20px 16px 10px; color:var(--primary)">📅 Timeline</h3>';
        for(let uf in db) db[uf].forEach(v => {
            html += `<div class="card" style="display:flex; gap:15px; align-items:center; padding:15px;">
                <img src="${v.fotos[0] || ''}" style="width:60px; height:60px; border-radius:12px; object-fit:cover; background:#eee">
                <div><b style="font-size:14px;">${v.cidade} - ${v.uf.replace('BR','')}</b><br><small style="color:var(--text-sub)">${v.data} • R$ ${v.total.toFixed(2)}</small></div>
            </div>`;
        });
        document.getElementById('timeline-container').innerHTML = html;
    }

    function renderGastos() {
        const db = JSON.parse(localStorage.getItem('viagens_v6_premium')) || {};
        let html = '', totalGeral = 0;
        for (const uf in db) {
            let totalUF = 0, cidadesHtml = '';
            db[uf].forEach(c => {
                totalUF += c.total;
                cidadesHtml += `<div class="cidade-financeiro">
                    <div class="cidade-nome-row"><span>🏙️ ${c.cidade}</span><span>R$ ${c.total.toFixed(2)}</span></div>
                    <div class="categoria-pills">
                        <div class="pill">🏨 ${c.h.toFixed(0)}</div><div class="pill">🚗 ${c.t.toFixed(0)}</div>
                        <div class="pill">🍴 ${c.al.toFixed(0)}</div><div class="pill">🎡 ${c.at.toFixed(0)}</div>
                    </div>
                </div>`;
            });
            totalGeral += totalUF;
            html += `<div class="resumo-uf-card"><div class="header-relatorio"><div class="uf-tag">🚩 ${uf.replace('BR','')}</div><div class="uf-total">R$ ${totalUF.toFixed(2)}</div></div>${cidadesHtml}</div>`;
        }
        document.getElementById('lista-detalhada-gastos').innerHTML = html || '<p style="text-align:center; padding:20px; color:#999;">Sem gastos registrados.</p>';
        document.getElementById('total-geral-brasil').innerText = `Total Brasil: R$ ${totalGeral.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
    }

    function abrirHistorico(id) {
        const db = JSON.parse(localStorage.getItem('viagens_v6_premium')) || {};
        const lista = db[id]; if (!lista) return;
        let h = `<h2 style="color:var(--primary); margin-bottom:10px;">🚩 ${id.replace('BR','')}</h2><div style="max-height:400px; overflow-y:auto; overflow-x:hidden;">`;
        lista.forEach((v, vIdx) => {
            let track = '', dots = '';
            v.fotos.forEach((f, fIdx) => {
                track += `<img src="${f}" class="carousel-item">`;
                dots += `<div class="dot ${fIdx === 0 ? 'active' : ''}"></div>`;
            });
            h += `<div class="cidade-entry">
                <div class="carousel-container" id="carousel-${vIdx}" ontouchstart="hTS(event)" ontouchmove="hTM(event, ${vIdx})">
                    <div class="carousel-track">${track || '<div class="carousel-item" style="background:#eee"></div>'}</div>
                    <div class="carousel-dots">${dots}</div>
                </div>
                <p style="margin:5px 0 0; font-weight:800; font-size:17px;">${v.cidade}</p>
                <small style="color:var(--text-sub)">${v.data} • <b>R$ ${v.total.toFixed(2)}</b></small>
            </div>`;
        });
        document.getElementById('popup-content').innerHTML = h + '</div>';
        document.getElementById('photo-popup').classList.add('show');
        document.getElementById('popup-overlay').classList.add('show');
    }

    let sX = 0; function hTS(e) { sX = e.touches[0].clientX; }
    function hTM(e, vIdx) {
        if (!sX) return;
        let d = sX - e.touches[0].clientX;
        let track = document.getElementById(`carousel-${vIdx}`).querySelector('.carousel-track');
        let dots = document.getElementById(`carousel-${vIdx}`).querySelectorAll('.dot');
        let idx = Array.from(dots).findIndex(x => x.classList.contains('active'));
        if (Math.abs(d) > 50) {
            if (d > 0 && idx < dots.length - 1) idx++; else if (d < 0 && idx > 0) idx--;
            track.style.transform = `translateX(-${idx * 100}%)`;
            dots.forEach((x, i) => x.classList.toggle('active', i === idx));
            sX = 0;
        }
    }

    function fecharPopup() { document.getElementById('photo-popup').classList.remove('show'); document.getElementById('popup-overlay').classList.remove('show'); }
    function atualizarInterface() {
        const db = JSON.parse(localStorage.getItem('viagens_v6_premium')) || {};
        Object.keys(db).forEach(u => { const el = document.getElementById(u); if(el) el.classList.add('visitado'); });
        document.getElementById('info').innerText = `${Object.keys(db).length} ESTADOS CONQUISTADOS`;
    }
    function converter(f) { return new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = e => { const img = new Image(); img.src = e.target.result; img.onload = () => { const cv = document.createElement('canvas'); const ctx = cv.getContext('2d'); cv.width = 600; cv.height = 600 * (img.height/img.width); ctx.drawImage(img, 0, 0, cv.width, cv.height); r(cv.toDataURL('image/jpeg', 0.5)); }; }; }); }
    init();
</script>
</body>
</html>
