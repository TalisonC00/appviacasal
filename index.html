<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nossa Jornada 👩‍❤️‍👨</title>
    
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');

        :root { 
            --primary: #FF4B5C; 
            --sky: #BAE6FD; /* Azul céu mais vivo */
            --card: #FFFFFF;
            --text-sub: #64748B;
        }

        /* FUNDO AZUL FORÇADO */
        html, body { 
            background-color: var(--sky) !important; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; padding: 0; 
            overflow: hidden; 
            touch-action: none; 
            height: 100%;
        }
        
        .header { 
            background: #fff; 
            padding: 12px; 
            text-align: center; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.05); 
            position: relative; z-index: 100;
        }
        /* Título Vermelho Coral */
        .header h3 { margin: 0; font-size: 20px; color: var(--primary) !important; font-weight: 800; }

        .aba { display: none; width: 100%; height: calc(100vh - 165px); }
        .ativa { display: block; }

        /* MOLDURA DO MAPA CENTRALIZADA */
        .mapa-card { 
            background: #fff; 
            margin: 15px; 
            border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            height: calc(100% - 30px); 
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow: hidden; 
            position: relative;
        }
        
        #svg-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        path { fill: #F1F5F9; stroke: #fff; stroke-width: 0.6; }
        .visitado { fill: var(--primary) !important; }

        /* POP-UP */
        #photo-popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            background: #fff; padding: 20px; border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            z-index: 2000; width: 85%; max-width: 320px; text-align: center;
            opacity: 0; visibility: hidden; transition: 0.3s;
        }
        #photo-popup.show { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
        .lista-memorias { max-height: 380px; overflow-y: auto; margin-top: 15px; }
        .memoria-item { background: #F8FAFC; padding: 12px; border-radius: 15px; margin-bottom: 12px; text-align: left; }
        .foto-memoria { width: 100%; height: 160px; object-fit: cover; border-radius: 12px; }

        .close-popup { 
            position: absolute; top: -10px; right: -10px; 
            background: var(--primary); color: white; border: none; border-radius: 50%; 
            width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 20px; cursor: pointer;
        }

        #popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1999; opacity: 0; visibility: hidden; transition: 0.3s; backdrop-filter: blur(3px); }
        #popup-overlay.show { opacity: 1; visibility: visible; }

        /* FORMULÁRIO */
        .card-form { background: #fff; padding: 25px; margin: 15px; border-radius: 25px; }
        select, input, .btn-submit { width: 100%; padding: 15px; margin: 8px 0; border-radius: 15px; border: 1px solid #E2E8F0; font-size: 16px; box-sizing: border-box; }
        .btn-submit { background: var(--primary); color: white; border: none; font-weight: 700; }

        /* BARRA INFERIOR */
        .menu-nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            display: flex; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1000; 
            border-top-left-radius: 30px; border-top-right-radius: 30px; height: 85px;
        }
        .btn-aba { flex: 1; border: none; background: none; font-size: 28px; color: #CBD5E1; }
        .btn-aba.active { color: var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <h3>Nossa Jornada 👩‍❤️‍👨</h3>
        <span id="info" style="font-size: 11px; font-weight: 700; color:var(--text-sub);">CARREGANDO...</span>
    </div>

    <div id="popup-overlay" onclick="fecharPopup()"></div>
    <div id="photo-popup">
        <button class="close-popup" onclick="fecharPopup()">×</button>
        <div id="popup-content"></div>
    </div>

    <div id="aba-mapa" class="aba ativa">
        <div class="mapa-card">
            <div id="svg-container"></div>
        </div>
    </div>

    <div id="aba-registro" class="aba">
        <div class="card-form">
            <h3 style="margin-top:0; color: var(--primary);">📍 Registrar Visita</h3>
            <select id="sel-uf">
                <option value="BRAC">Acre</option><option value="BRAL">Alagoas</option><option value="BRAM">Amazonas</option><option value="BRAP">Amapá</option><option value="BRBA">Bahia</option><option value="BRCE">Ceará</option><option value="BRDF">Distrito Federal</option><option value="BRES">Espírito Santo</option><option value="BRGO">Goiás</option><option value="BRMA">Maranhão</option><option value="BRMG">Minas Gerais</option><option value="BRMS">Mato Grosso do Sul</option><option value="BRMT">Mato Grosso</option><option value="BRPA">Pará</option><option value="BRPB">Paraíba</option><option value="BRPE">Pernambuco</option><option value="BRPI">Piauí</option><option value="BRPR">Paraná</option><option value="BRRJ">Rio de Janeiro</option><option value="BRRN">Rio Grande do Norte</option><option value="BRRO">Rondônia</option><option value="BRRR">Roraima</option><option value="BRRS">Rio Grande do Sul</option><option value="BRSC">Santa Catarina</option><option value="BRSE">Sergipe</option><option value="BRSP" selected>São Paulo</option><option value="BRTO">Tocantins</option>
            </select>
            <input type="text" id="txt-cidade" placeholder="Nome da Cidade">
            <input type="date" id="txt-data">
            <input type="file" id="inp-foto" accept="image/*">
            <button class="btn-submit" onclick="salvarViagem()">Salvar Memória 🚩</button>
        </div>
    </div>

    <nav class="menu-nav">
        <button class="btn-aba active" onclick="trocarAba('mapa', this)">🗺️</button>
        <button class="btn-aba" onclick="trocarAba('registro', this)">➕</button>
    </nav>

<script>
    let panZoomMapa;

    fetch('br.svg')
        .then(res => res.text())
        .then(svgText => {
            const container = document.getElementById('svg-container');
            container.innerHTML = svgText;
            const svgEl = container.querySelector('svg');
            svgEl.removeAttribute('width'); svgEl.removeAttribute('height');
            svgEl.id = "mapa-svg-real"; 

            panZoomMapa = svgPanZoom('#mapa-svg-real', {
                zoomEnabled: true, controlIconsEnabled: false,
                fit: true, center: true, minZoom: 1, maxZoom: 15,
                onPan: function() { svgEl.setAttribute('isPanning', 'true'); },
                onZoom: function() { svgEl.setAttribute('isPanning', 'true'); }
            });

            document.querySelectorAll('path').forEach(estado => {
                estado.addEventListener('touchend', function(e) {
                    if(e.cancelable) e.preventDefault(); 
                    if (svgEl.getAttribute('isPanning') === 'true') {
                        svgEl.setAttribute('isPanning', 'false'); return;
                    }
                    abrirHistorico(this.id);
                });
                estado.addEventListener('click', function() {
                    if (svgEl.getAttribute('isPanning') === 'true') {
                         svgEl.setAttribute('isPanning', 'false'); return;
                    }
                    abrirHistorico(this.id);
                });
            });
            atualizarInterface();
        });

    function trocarAba(id, btn) {
        fecharPopup();
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.querySelectorAll('.btn-aba').forEach(b => b.classList.remove('active'));
        document.getElementById('aba-' + id).classList.add('ativa');
        btn.classList.add('active');
    }

    function abrirHistorico(ufId) {
        const banco = JSON.parse(localStorage.getItem('viagens_vHist_v1')) || {};
        const lista = banco[ufId];
        if (lista && lista.length > 0) {
            const content = document.getElementById('popup-content');
            let html = `<h2 style="margin:0; color:var(--primary);">🚩 ${ufId.replace('BR','')}</h2><div class="lista-memorias">`;
            lista.forEach(v => {
                html += `<div class="memoria-item">
                    ${v.foto ? `<img src="${v.foto}" class="foto-memoria">` : '<div style="height:100px;background:#eee;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#aaa">Sem foto</div>'}
                    <p style="margin:10px 0 2px 0; font-weight:700;">${v.cidade}</p>
                    <span style="font-size:11px; color:#999;">📅 ${v.data}</span>
                </div>`;
            });
            html += `</div>`;
            content.innerHTML = html;
            document.getElementById('photo-popup').classList.add('show');
            document.getElementById('popup-overlay').classList.add('show');
        }
    }

    function fecharPopup() {
        document.getElementById('photo-popup').classList.remove('show');
        document.getElementById('popup-overlay').classList.remove('show');
    }

    async function salvarViagem() {
        const uf = document.getElementById('sel-uf').value;
        const cidade = document.getElementById('txt-cidade').value;
        const dataInput = document.getElementById('txt-data').value;
        const inputFoto = document.getElementById('inp-foto');
        if(!cidade) return alert("Escreva o nome da cidade!");
        let fotoBase64 = null;
        if (inputFoto.files && inputFoto.files[0]) fotoBase64 = await converter(inputFoto.files[0]);
        let dataFinal = dataInput ? dataInput.split('-').reverse().join('/') : new Date().toLocaleDateString('pt-BR');
        let banco = JSON.parse(localStorage.getItem('viagens_vHist_v1')) || {};
        if (!banco[uf]) banco[uf] = [];
        banco[uf].unshift({ cidade, foto: fotoBase64, data: dataFinal });
        localStorage.setItem('viagens_vHist_v1', JSON.stringify(banco));
        location.reload(); 
    }

    function atualizarInterface() {
        const banco = JSON.parse(localStorage.getItem('viagens_vHist_v1')) || {};
        const ufs = Object.keys(banco);
        ufs.forEach(uf => {
            const el = document.getElementById(uf) || document.querySelector(`[id="${uf}"]`);
            if(el) el.classList.add('visitado');
        });
        document.getElementById('info').innerText = `${ufs.length} ESTADOS CONQUISTADOS`;
    }

    function converter(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = 400; let scale = max / Math.max(img.width, img.height);
                    canvas.width = img.width * scale; canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                }
            }
        });
    }
</script>
</body>
</html>
