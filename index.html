<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nossa Jornada 👩‍❤️‍👨</title>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --primary: #FF4B5C; --sky: #BAE6FD; --card: #FFFFFF; --text-main: #1E293B; --text-sub: #64748B; --money: #10B981; }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--sky); margin: 0; padding: 0; overflow: hidden; touch-action: none; color: var(--text-main); }
        .header { background: #fff; padding: 20px 16px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.03); position: relative; z-index: 100; }
        .header h3 { margin: 0; font-size: 20px; color: var(--primary) !important; font-weight: 800; }
        #info { font-size: 11px; font-weight: 800; color: #000; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; display: block; }

        .aba { display: none; width: 100%; height: calc(100vh - 175px); overflow-y: auto; padding-bottom: 50px; -webkit-overflow-scrolling: touch; }
        .ativa { display: block; }
        .card { background: var(--card); padding: 24px; margin: 16px; border-radius: 32px; box-shadow: 0 12px 40px rgba(0,0,0,0.06); }

        /* MAPA */
        .mapa-card { background: var(--card); margin: 16px; border-radius: 28px; height: calc(100% - 32px); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        #svg-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #fff; }
        path { fill: #F1F5F9; stroke: #fff; stroke-width: 0.8; transition: 0.5s; cursor: pointer; }
        
        /* TIMELINE COM LINHA CONECTORA */
        .timeline-container { padding: 20px 25px; position: relative; }
        .timeline-line { position: absolute; left: 33px; top: 0; bottom: 0; width: 3px; background: rgba(255,255,255,0.7); z-index: 1; border-radius: 10px; }
        .timeline-item { display: flex; gap: 15px; margin-bottom: 30px; position: relative; z-index: 2; }
        .t-dot { min-width: 14px; height: 14px; background: var(--primary); border: 3px solid #fff; border-radius: 50%; margin-top: 6px; box-shadow: 0 0 0 2px rgba(255,75,92,0.2); }
        .t-card { background: #fff; padding: 20px; border-radius: 28px; flex: 1; box-shadow: 0 8px 20px rgba(0,0,0,0.04); }

        /* GASTOS - ESPAÇAMENTO PREMIUM */
        .resumo-uf-card { background: #fff; border-radius: 24px; padding: 24px; margin-bottom: 24px; border: 1.5px solid #F1F5F9; }
        .uf-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f8fafc; padding-bottom: 14px; margin-bottom: 14px; }
        .gasto-entry { padding: 20px 0; border-bottom: 1px solid #f8fafc; }
        .cidade-data-row { display: flex; justify-content: space-between; font-size: 13px; font-weight: 800; color: var(--text-main); margin-bottom: 12px; }
        .pill { background: #F8FAFC; padding: 7px 12px; border-radius: 12px; font-size: 10px; font-weight: 700; color: var(--text-sub); display: flex; align-items: center; gap: 5px; border: 1px solid #eee; }

        /* FORMULÁRIO */
        input, select { width: 100%; padding: 14px; border-radius: 14px; border: 1.5px solid #F1F5F9; font-family: inherit; background: #F8FAFC; box-sizing: border-box; }
        label { font-size: 10px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; margin: 12px 0 4px 4px; display: block; }
        .btn-acao { background: var(--primary); color: #fff; border: none; padding: 16px; border-radius: 18px; width: 100%; font-weight: 800; margin-top: 15px; cursor: pointer; }

        /* POP-UP & CARROSSEL */
        #photo-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); background: #fff; padding: 24px; border-radius: 32px; box-shadow: 0 25px 60px rgba(0,0,0,0.3); z-index: 2100; width: 90%; max-width: 340px; text-align: center; opacity: 0; visibility: hidden; transition: 0.3s; }
        #photo-popup.show { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
        .popup-scroll { max-height: 480px; overflow-y: auto; padding-right: 5px; text-align: left; }
        .carousel-fotos { position: relative; width: 100%; overflow: hidden; border-radius: 20px; margin: 12px 0; height: 180px; background: #f1f5f9; }
        .track-fotos { display: flex; transition: transform 0.4s ease; height: 100%; }
        .img-slide { min-width: 100%; height: 100%; object-fit: cover; }
        .dots-fotos { display: flex; justify-content: center; gap: 4px; margin-top: -15px; position: relative; padding-bottom: 10px; }
        .dot { width: 5px; height: 5px; background: rgba(255,255,255,0.6); border-radius: 50%; }
        .dot.active { background: #fff; width: 12px; border-radius: 10px; }

        /* BOTÃO X FIXO NO TOPO */
        .close-popup { position: absolute; top: 15px; right: 15px; background: var(--primary); color: white; border: none; border-radius: 50%; width: 32px; height: 32px; font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 3000; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; opacity: 0; visibility: hidden; transition: 0.3s; backdrop-filter: blur(4px); }

        .menu-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; display: flex; height: 85px; border-top-left-radius: 30px; border-top-right-radius: 30px; z-index: 1000; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); }
        .btn-aba { flex: 1; border: none; background: none; font-size: 24px; color: #CBD5E1; cursor: pointer; outline: none; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        .btn-aba.active { color: var(--primary); transform: translateY(-5px); }

        .badge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; justify-items: center; }
        .badge { display: flex; flex-direction: column; align-items: center; opacity: 0.15; filter: grayscale(1); }
        .badge.active { opacity: 1; filter: grayscale(0); }
        .b-icon { width: 50px; height: 50px; background: #F1F5F9; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="header"><h3>Nossa Jornada 👩‍❤️‍👨</h3><span id="info">ESTADOS CONQUISTADOS: 0</span></div>
    <div id="popup-overlay" onclick="fecharPopup()"></div>
    <div id="photo-popup"><button class="close-popup" onclick="fecharPopup()">✕</button><div id="popup-content" class="popup-scroll"></div></div>
    
    <div id="aba-mapa" class="aba ativa"><div class="mapa-card"><div id="svg-container"></div></div></div>
    <div id="aba-timeline" class="aba"><div class="timeline-container"><div class="timeline-line"></div><div id="timeline-list"></div></div></div>
    <div id="aba-jornada" class="aba">
        <div class="card">
            <h3 style="margin:0 0 20px 0; color:var(--primary); font-size: 20px;">🏆 Conquistas</h3>
            <div class="badge-grid" id="grid-conquistas"></div>
        </div>
    </div>
    <div id="aba-registro" class="aba">
        <div class="card">
            <h3 style="margin:0 0 10px 0; color:var(--primary)">📍 Nova Memória</h3>
            <label>Estado</label>
            <select id="sel-uf">
                <option value="BRSP">São Paulo</option><option value="BRRJ">Rio de Janeiro</option><option value="BRMG">Minas Gerais</option><option value="BRBA">Bahia</option><option value="BRSC">Santa Catarina</option><option value="BRPR">Paraná</option><option value="BRRS">Rio Grande do Sul</option><option value="BRGO">Goiás</option><option value="BRDF">Distrito Federal</option><option value="BRES">Espírito Santo</option><option value="BRCE">Ceará</option><option value="BRPE">Pernambuco</option><option value="BRRN">Rio Grande do Norte</option><option value="BRPB">Paraíba</option><option value="BRAL">Alagoas</option><option value="BRSE">Sergipe</option><option value="BRMA">Maranhão</option><option value="BRPI">Piauí</option><option value="BRMT">Mato Grosso</option><option value="BRMS">Mato Grosso do Sul</option><option value="BRTO">Tocantins</option><option value="BRPA">Pará</option><option value="BRAM">Amazonas</option><option value="BRRO">Rondônia</option><option value="BRAC">Acre</option><option value="BRRR">Roraima</option><option value="BRAP">Amapá</option>
            </select>
            <label>Cidade</label><input type="text" id="txt-cidade" placeholder="Ex: Gramado">
            <label>Data da Visita</label><input type="date" id="txt-data">
            <label style="display:flex; align-items:center; gap:8px; margin:15px 0;"><input type="checkbox" id="chk-praia" style="width:18px;height:18px;"><span style="font-size:12px; font-weight:800; color:var(--text-sub)">VIAGEM DE PRAIA? 🏖️</span></label>
            <label>Gastos (R$)</label>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"><input type="number" id="v-hosp" placeholder="Hotel"><input type="number" id="v-trans" placeholder="Transporte"><input type="number" id="v-alime" placeholder="Comida"><input type="number" id="v-atrac" placeholder="Atrações"></div>
            <label>Fotos (Máx 3)</label><input type="file" id="inp-foto" accept="image/*" multiple>
            <button class="btn-acao" onclick="salvarViagem()">Salvar Memória 🚩</button>
        </div>
    </div>
    <div id="aba-gastos" class="aba">
        <div class="card" style="padding:20px 16px;">
            <h3 style="margin:0 0 20px 0; color:var(--money)">💰 Gastos</h3>
            <div id="lista-detalhada-gastos"></div>
            <div style="background:var(--sky); color:#000; padding:22px; border-radius:28px; text-align:center; font-weight:800; font-size:18px; margin:30px 0 10px 0;" id="total-geral-brasil">Total Brasil: R$ 0,00</div>
        </div>
    </div>

    <nav class="menu-nav">
        <button class="btn-aba active" onclick="trocarAba('mapa', this)">🗺️</button>
        <button class="btn-aba" onclick="trocarAba('timeline', this)">🕒</button>
        <button class="btn-aba" onclick="trocarAba('jornada', this)">🏆</button>
        <button class="btn-aba" onclick="trocarAba('registro', this)">➕</button>
        <button class="btn-aba" onclick="trocarAba('gastos', this)">💰</button>
    </nav>

<script>
    const REGIOES = {
        'NORTE': { icon: '🌳', color: '#22C55E', UFs: ['BRAC','BRAM','BRRR','BRRO','BRPA','BRAP','BRTO'], nomes: ['Acre','Amazonas','Roraima','Rondônia','Pará','Amapá','Tocantins'] },
        'NORDESTE': { icon: '🌵', color: '#FACC15', UFs: ['BRMA','BRPI','BRCE','BRRN','BRPB','BRPE','BRAL','BRSE','BRBA'], nomes: ['Maranhão','Piauí','Ceará','Rio Grande do Norte','Paraíba','Pernambuco','Alagoas','Sergipe','Bahia'] },
        'CENTRO': { icon: '☀️', color: '#FB923C', UFs: ['BRMT','BRMS','BRGO','BRDF'], nomes: ['Mato Grosso','Mato Grosso do Sul','Goiás','Distrito Federal'] },
        'SUDESTE': { icon: '🏢', color: '#EC4899', UFs: ['BRMG','BRSP','BRRJ','BRES'], nomes: ['Minas Gerais','São Paulo','Rio de Janeiro','Espírito Santo'] },
        'SUL': { icon: '❄️', color: '#A855F7', UFs: ['BRPR','BRSC','BRRS'], nomes: ['Paraná','Santa Catarina','Rio Grande do Sul'] }
    };

    let panZoomMapa;
    async function init() {
        const res = await fetch('br.svg');
        const svg = await res.text();
        document.getElementById('svg-container').innerHTML = svg;
        const svgEl = document.querySelector('#svg-container svg');
        svgEl.id = "mapa-svg-real"; svgEl.style.width = "100%"; svgEl.style.height = "100%";
        panZoomMapa = svgPanZoom('#mapa-svg-real', { zoomEnabled: true, controlIconsEnabled: false, fit: true, center: true });
        document.getElementById('svg-container').addEventListener('touchend', (e) => {
            const target = e.target.closest('path');
            if (target && target.id) abrirHistorico(target.id);
        });
        atualizarInterface();
    }

    function trocarAba(id, btn) {
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.querySelectorAll('.btn-aba').forEach(b => b.classList.remove('active'));
        document.getElementById('aba-' + id).classList.add('ativa');
        btn.classList.add('active');
        if(id === 'gastos') renderGastos();
        if(id === 'jornada') renderJornada();
        if(id === 'timeline') renderTimeline();
    }

    async function salvarViagem() {
        const uf = document.getElementById('sel-uf').value;
        const cidade = document.getElementById('txt-cidade').value;
        const rawDate = document.getElementById('txt-data').value;
        if(!cidade || !rawDate) return alert("Preencha cidade e data!");
        const files = document.getElementById('inp-foto').files;
        let fotos = []; for (let i = 0; i < Math.min(files.length, 3); i++) { fotos.push(await converter(files[i])); }
        const trip = { cidade, uf, data: rawDate.split('-').reverse().join('/'), rawDate, fotos, h: parseFloat(document.getElementById('v-hosp').value || 0), t: parseFloat(document.getElementById('v-trans').value || 0), al: parseFloat(document.getElementById('v-alime').value || 0), at: parseFloat(document.getElementById('v-atrac').value || 0), praia: document.getElementById('chk-praia').checked, total: (parseFloat(document.getElementById('v-hosp').value || 0) + parseFloat(document.getElementById('v-trans').value || 0) + parseFloat(document.getElementById('v-alime').value || 0) + parseFloat(document.getElementById('v-atrac').value || 0)) };
        let db = JSON.parse(localStorage.getItem('viagens_vFinal_v13')) || {};
        if(!db[uf]) db[uf] = []; db[uf].unshift(trip);
        localStorage.setItem('viagens_vFinal_v13', JSON.stringify(db));
        location.reload();
    }

    function renderTimeline() {
        const db = JSON.parse(localStorage.getItem('viagens_vFinal_v13')) || {};
        let todas = []; for(let uf in db) db[uf].forEach(v => todas.push(v));
        todas.sort((a,b) => new Date(b.rawDate) - new Date(a.rawDate));
        let html = '<h3 style="margin:0 0 20px 20px; color:var(--primary)">📅 Timeline</h3>';
        todas.forEach(v => {
            html += `<div class="timeline-item"><div class="t-dot"></div><div class="t-card">
                <span style="font-size:11px; font-weight:800; color:var(--text-sub)">${v.cidade} - ${v.data}</span>
                <h4 style="margin:5px 0; font-size:15px; font-weight:800; color:var(--money)">R$ ${v.total.toFixed(2)}</h4>
                ${v.fotos[0] ? `<img src="${v.fotos[0]}" style="width:100%; height:160px; object-fit:cover; border-radius:18px;">` : ''}
            </div></div>`;
        });
        document.getElementById('timeline-list').innerHTML = html || '<p style="text-align:center;color:#999;padding:20px;">Sem memórias ainda.</p>';
    }

    function renderGastos() {
        const db = JSON.parse(localStorage.getItem('viagens_vFinal_v13')) || {};
        let html = '', totalGeral = 0;
        for (const uf in db) {
            let totalUF = 0; let cidadesHtml = '';
            db[uf].forEach(c => {
                totalUF += c.total;
                cidadesHtml += `<div class="gasto-entry">
                    <div class="cidade-data-row"><span>${c.cidade} - ${c.data}</span><strong style="color:var(--money)">R$ ${c.total.toFixed(2)}</strong></div>
                    <div style="display:flex; gap:8px;"><div class="pill">🏨 ${c.h.toFixed(0)}</div><div class="pill">🚗 ${c.t.toFixed(0)}</div><div class="pill">🍴 ${c.al.toFixed(0)}</div><div class="pill">🎡 ${c.at.toFixed(0)}</div></div>
                </div>`;
            });
            totalGeral += totalUF;
            html += `<div class="resumo-uf-card"><div class="uf-header"><strong>🚩 ${uf.replace('BR','')}</strong><strong style="color:var(--money); font-size:18px;">R$ ${totalUF.toFixed(2)}</strong></div>${cidadesHtml}</div>`;
        }
        document.getElementById('lista-detalhada-gastos').innerHTML = html || '<p style="text-align:center; padding:20px; color:#999;">Sem gastos registrados.</p>';
        document.getElementById('total-geral-brasil').innerText = `Total Brasil: R$ ${totalGeral.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
    }

    function renderJornada() {
        const db = JSON.parse(localStorage.getItem('viagens_vFinal_v13')) || {};
        const visitados = Object.keys(db); let html = '';
        const metas = [{n:1, l:'Início', i:'🌱'}, {n:5, l:'5 Estados', i:'🏃'}, {n:10, l:'10 Estados', i:'⭐'}, {n:20, l:'20 Estados', i:'🔥'}, {n:26, l:'Brasil', i:'👑'}];
        metas.forEach(m => {
            const ok = visitados.length >= m.n;
            html += `<div class="badge ${ok ? 'active' : ''}" onclick="if(!${ok}) alert('Faltam ${m.n - visitados.length} estados!')"><div class="b-icon">${m.i}</div><div style="font-size:8px;font-weight:800">${m.l}</div></div>`;
        });
        let temPraia = false; for(let u in db) db[u].forEach(v => { if(v.praia) temPraia = true; });
        html += `<div class="badge ${temPraia ? 'active' : ''}"><div class="b-icon">🏖️</div><div style="font-size:8px;font-weight:800">AREIA</div></div>`;
        for(let r in REGIOES) {
            const reg = REGIOES[r]; const vNaReg = reg.UFs.filter(u => visitados.includes(u)); const ok = vNaReg.length === reg.UFs.length;
            html += `<div class="badge ${ok ? 'active' : ''}" onclick="msgRegiao('${r}', ${ok})"><div class="b-icon">${reg.icon}</div><div style="font-size:8px;font-weight:800">${r}</div></div>`;
        }
        document.getElementById('grid-conquistas').innerHTML = html;
    }

    function msgRegiao(r, ok) { if(ok) return; const db = JSON.parse(localStorage.getItem('viagens_vFinal_v13')) || {}; const faltantes = REGIOES[r].nomes.filter((n, i) => !Object.keys(db).includes(REGIOES[r].UFs[i])); alert(`Faltam no ${r}: ${faltantes.join(', ')}`); }

    function abrirHistorico(id) {
        const db = JSON.parse(localStorage.getItem('viagens_vFinal_v13')) || {};
        const lista = db[id]; if (!lista) return;
        let h = `<h2 style="color:var(--primary); margin:0 0 15px 0;">🚩 ${id.replace('BR','')}</h2>`;
        lista.forEach((v, cIdx) => {
            let track = '', dots = '';
            v.fotos.forEach((f, fIdx) => { track += `<img src="${f}" class="img-slide">`; dots += `<div class="dot ${fIdx === 0 ? 'active' : ''}"></div>`; });
            h += `<div style="margin-bottom:30px; border-bottom:1px solid #eee; padding-bottom:15px;">
                <p style="margin:0; font-size:14px; font-weight:800; color:var(--text-sub);">${v.cidade} - ${v.data}</p>
                <h4 style="margin:5px 0 10px 0; color:var(--money); font-weight:800; font-size:16px;">R$ ${v.total.toFixed(2)}</h4>
                <div class="carousel-fotos" id="car-${cIdx}" ontouchstart="hTS(event)" ontouchmove="hTM(event, ${cIdx}, ${v.fotos.length})">
                    <div class="track-fotos">${track || '<div class="img-slide" style="background:#eee"></div>'}</div>
                </div>
                <div class="dots-fotos">${dots}</div>
            </div>`;
        });
        document.getElementById('popup-content').innerHTML = h;
        document.getElementById('photo-popup').classList.add('show');
        document.getElementById('popup-overlay').style.visibility = 'visible'; document.getElementById('popup-overlay').style.opacity = '1';
    }

    let sX = 0; function hTS(e) { sX = e.touches[0].clientX; }
    function hTM(e, cIdx, len) { if (!sX) return; let d = sX - e.touches[0].clientX; let tr = document.querySelector(`#car-${cIdx} .track-fotos`); let dots = document.querySelectorAll(`#car-${cIdx} + .dots-fotos .dot`); let curIdx = Math.round(Math.abs(new WebKitCSSMatrix(window.getComputedStyle(tr).transform).m41 / tr.offsetWidth)); if (Math.abs(d) > 40) { if (d > 0 && curIdx < len - 1) curIdx++; else if (d < 0 && curIdx > 0) curIdx--; tr.style.transform = `translateX(-${curIdx * 100}%)`; dots.forEach((dt, i) => dt.classList.toggle('active', i === curIdx)); sX = 0; } }

    function fecharPopup() { document.getElementById('photo-popup').classList.remove('show'); document.getElementById('popup-overlay').style.opacity = '0'; setTimeout(() => document.getElementById('popup-overlay').style.visibility = 'hidden', 300); }
    function atualizarInterface() { const db = JSON.parse(localStorage.getItem('viagens_vFinal_v13')) || {}; Object.keys(db).forEach(u => { const el = document.getElementById(u); if(el) el.classList.add('visitado'); }); document.getElementById('info').innerText = `ESTADOS CONQUISTADOS: ${Object.keys(db).length}`; }
    function converter(f) { return new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => { const img = new Image(); img.src = rd.result; img.onload = () => { const cv = document.createElement('canvas'); const ctx = cv.getContext('2d'); cv.width = 600; cv.height = 600 * (img.height/img.width); ctx.drawImage(img, 0, 0, cv.width, cv.height); r(cv.toDataURL('image/jpeg', 0.5)); }; }; }); }
    init();
</script>
</body>
</html>
